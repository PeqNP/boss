<div class="ui-application">
  <script type="text/javascript">
    function Theme(id, fill, stroke, icon) {
      this.id = id;
      this.fill = fill;
      this.stroke = stroke;
      this.icon = icon;
    }

    class FileResource{
      id;
      url;

      constructor(id, url) {
        this.id = id;
        this.url = url;
      }
    }

    function $(this.id)(config) {
      function close() {
        os.closeApplication('$(app.bundleId)');
      }
      this.close = close;

      async function showAbout() {
        let win = await $(this.controller).loadController("About");
        win.ui.show();
      }
      this.showAbout = showAbout;

      async function showHome() {
        let win = await $(this.controller).loadController("Home");
        win.ui.show();
      }
      this.showHome = showHome;

      async function applicationDidStart() {
        await showHome();
      }
      this.applicationDidStart = applicationDidStart;
    }
  </script>
  <div class="ui-menus">
    <div class="ui-menu" style="width: 180px">
      <select name="application-menu">
        <option>Lean</option>
        <option onclick="$(this.controller).showAbout();">About Lean</option>
        <option class="group"></option>
        <option onclick="$(this.controller).showHome();">Show companies</option>
        <option class="group"></option>
        <option onclick="$(this.controller).close();">Close Lean</option>
      </select>
    </div>
  </div>
  <template id="ThemeController">
    <div class="ui-controller vbox gap-10" name="theme">
      <script type="text/javascript">
        function %(theme)(view) {
          let theme = new Theme(null, "white", "black");

          let delegate = protocol(
            "ThemeDelegate", this, "delegate",
            [
              /**
               * Returns group of colors that represent the theme.
               *
               * @param {Theme} theme - The group of colors that represent the theme.
               */
              "didSelectTheme"
            ]
          );

          function setTheme() {
            view.ui.div("example-color").style.backgroundColor = theme.fill;
            view.ui.div("example-color").style.borderColor = theme.stroke;
          }

          function selectFill() {
            os.ui.showColorPicker(function (color) {
              theme.fill = color;
              setTheme();
              delegate.didSelectTheme(theme);
            });
          }
          this.selectFill = selectFill;

          function selectStroke() {
            os.ui.showColorPicker(function (color) {
              theme.stroke = color;
              setTheme();
              delegate.didSelectTheme(theme);
            });
          }
          this.selectStroke = selectStroke;

          function configure(_theme) {
            if (isEmpty(_theme)) {
              return;
            }
            theme = _theme;
            setTheme();
          }
          this.configure = configure;

          function viewDidLoad() {
            setTheme();
          }
          this.viewDidLoad = viewDidLoad;
        }
      </script>
      <details class="ui-accordion" closed>
        <summary>Color theme</summary>
        <div class="hbox gap-10">
          <div class="vbox gap-10" style="flex: 0 0 100px">
            <button class="primary" onclick="%(theme).selectFill();">Select fill</button>
            <button class="primary" onclick="%(theme).selectStroke();">Select stroke</button>
          </div>
          <div class="hbox align-center" style="flex: 1">
            <div name="example-color" style="border: 2px solid #000; border-radius: 5px; padding: 10px;">Example</div>
          </div>
        </div>
      </details>
    </div>
  </template>
  <template id="IconSelectorController">
    <div class="ui-controller vbox gap-10" name="iconSelector">
      <script type="text/javascript">
        function %(iconSelector)(view) {
          let config = new FileResource(null, "/boss/img/file-icon.svg");

          let delegate = protocol(
            "IconSelectorDelegate", this, "delegate",
            [
              /**
               * Returns a ResourceFile.
               *
               * @param {FileResource} resource - A system record of the file saved on the server
               */
              "didSaveIcon"
            ]
          );

          function setFileResource() {
            view.ui.img("url").src = config.url;
          }

          async function save() {
            const fileInput = view.ui.input("file-resource");
            if (!fileInput || !fileInput.files || fileInput.files.length === 0) {
              return;
            }
            const file = fileInput.files[0];
            if (!file.type.startsWith("image/")) {
              alert("Only image files are allowed.");
              return;
            }

            const resource = await os.network.file("/lean/image", file);
            config = resource;
            delegate.didSaveIcon(resource);
            setFileResource();
          }
          this.save = save;

          /**
           * @param {FileResource} _config
           */
          function configure(_config) {
            if (isEmpty(_config)) {
              return;
            }
            config = _config;
            setFileResource();
          }
          this.configure = configure;

          function viewDidLoad() {
            setFileResource();
          }
          this.viewDidLoad = viewDidLoad;
        }
      </script>
      <details class="ui-accordion" closed>
        <summary>Icon</summary>
        <div class="hbox gap-10">
          <img name="url" width="40" height="40">
          <div class="vbox align-center">
            <input name="file-resource" type="file">
          </div>
        </div>
      </details>
    </div>
  </template>
</div>
