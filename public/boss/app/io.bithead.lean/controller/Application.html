<div class="ui-application">
  <script type="text/javascript">
    function $(this.id)(config) {
      function close() {
        os.closeApplication('$(app.bundleId)');
      }
      this.close = close;

      async function showAbout() {
        let win = await $(this.controller).loadController("About");
        win.ui.show();
      }
      this.showAbout = showAbout;

      async function showHome() {
        let win = await $(this.controller).loadController("Home");
        win.ui.show();
      }
      this.showHome = showHome;

      async function applicationDidStart() {
        await showHome();
      }
      this.applicationDidStart = applicationDidStart;
    }
  </script>
  <div class="ui-menus">
    <div class="ui-menu" style="width: 180px">
      <select name="application-menu">
        <option>Lean</option>
        <option onclick="$(this.controller).showAbout();">About Lean</option>
        <option class="group"></option>
        <option onclick="$(this.controller).close();">Close Lean</option>
      </select>
    </div>
    <div class="ui-menu" style="width: 180px">
      <select name="file-menu">
        <option>File</option>
        <option onclick="$(this.controller).showHome();">Show companies</option>
      </select>
    </div>
  </div>
  <template id="ThemeController">
    <div class="ui-controller vbox gap-10" name="theme">
      <script type="text/javascript">
        function %(theme)(view) {
          let theme = new Theme("white", "black");

          function Theme(fill, stroke) {
            readOnly(this, "fill", fill);
            readOnly(this, "stroke", stroke);
          }

          let delegate = protocol(
            "ThemeDelegate", this, "delegate",
            [
              /**
               * Returns group of colors that represent the theme.
               *
               * @param {Theme} theme - The group of colors that represent the theme.
               */
              "didSelectTheme"
            ]
          );

          function setTheme() {
            view.ui.div("example-color").style.backgroundColor = theme.fill;
            view.ui.div("example-color").style.borderColor = theme.stroke;
          }

          function selectFill() {
            os.ui.showColorPicker(function (color) {
              theme.fill = color;
              setTheme();
              delegate.didSelectTheme(theme);
            });
          }
          this.selectFill = selectFill;

          function selectStroke() {
            os.ui.showColorPicker(function (color) {
              theme.stroke = color;
              setTheme();
              delegate.didSelectTheme(theme);
            });
          }
          this.selectStroke = selectStroke;

          function configure(_theme) {
            theme = _theme;
            setTheme();
          }
          this.configure = configure;

          function viewDidLoad() {
            setTheme();
          }
          this.viewDidLoad = viewDidLoad;
        }
      </script>
      <fieldset>
        <legend>Color theme</legend>
        <div class="hbox gap-10">
          <div class="vbox gap-10" style="flex: 0 0 100px">
            <button class="primary" onclick="%(theme).selectFill();">Select fill</button>
            <button class="primary" onclick="%(theme).selectStroke();">Select stroke</button>
          </div>
          <div class="hbox align-center" style="flex: 1">
            <div name="example-color" style="border: 2px solid #000; border-radius: 5px; padding: 10px;">Example</div>
          </div>
        </div>
      </fieldset>
    </div>
  </template>
</div>
