<div class="ui-application">
  <script type="text/javascript">
    function $(this.id)(config) {
      function close() {
        os.closeApplication('$(app.bundleId)');
      }
      this.close = close;

      async function showAbout() {
        let win = await $(this.controller).loadController("About");
        win.ui.show();
      }
      this.showAbout = showAbout;

      async function showHome() {
        let win = await $(this.controller).loadController("Home");
        win.ui.show();
      }
      this.showHome = showHome;

      async function showFactories() {
        let win = await $(this.controller).loadController("Factories");
        win.ui.show();
      }
      this.showFactories = showFactories;

      async function createFactory() {
        let win = await $(this.controller).loadController("Factory");
        win.ui.show();
      }
      this.createFactory = createFactory;

      async function applicationDidStart() {
        await showHome();
      }
      this.applicationDidStart = applicationDidStart;
    }
  </script>
  <div class="ui-menus">
    <div class="ui-menu" style="width: 180px">
      <select name="application-menu">
        <option>Lean</option>
        <option onclick="$(this.controller).showAbout();">About Lean</option>
        <option class="group"></option>
        <option onclick="$(this.controller).close();">Close Lean</option>
      </select>
    </div>
    <div class="ui-menu" style="width: 180px">
      <select name="file-menu">
        <option>File</option>
        <option onclick="$(this.controller).showHome();">Home</option>
        <option class="group"></option>
        <option onclick="$(this.controller).createFactory();">Create factory</option>
        <option onclick="$(this.controller).showFactories();">Factories</option>
      </select>
    </div>
  </div>
  <template id="ThemeController">
    <div class="ui-controller vbox gap-10" name="theme">
      <script type="text/javascript">
        function theme(view) {
          function selectFill() {
            os.ui.showColorPicker(function (color) {
              view.ui.divByName("example-color").style.backgroundColor = color;
            });
          }
          this.selectFill = selectFill;

          function selectBorder() {
            os.ui.showColorPicker(function (color) {
              view.ui.divByName("example-color").style.borderColor = color;
            });
          }
          this.selectBorder = selectBorder;

          function viewDidLoad() {
            // TODO: This will eventually be configured by consumer
            view.ui.divByName("example-color").style.backgroundColor = "#fff";
            view.ui.divByName("example-color").style.borderColor = "#000";
          }
          this.viewDidLoad = viewDidLoad;
        }
      </script>
      <fieldset>
        <legend>Color theme</legend>
        <div class="hbox gap-10">
          <div class="vbox gap-10">
            <button class="primary" onlick="%(theme).selectFill();">Select fill</button>
            <button class="primary" onlick="%(theme).selectBorder();">Select border</button>
          </div>
          <div class="hbox align-center">
            <div name="example-color" style="border: 1px solid #000; border-radius: 5px; padding: 5px;">Example</div>
          </div>
        </div>
      </fieldset>
    </div>
  </template>
</div>
