<div class="ui-window">
  <script type="text/javascript">
    function $(this.id)(view) {
      let intakeQueueId = null;

      /**
       * @param {int} _intakeQueueId - The ID of the intake queue whose work units to display
       */
      function configure(_intakeQueueId) {
        intakeQueueId = _intakeQueueId;
      }
      this.configure = configure;

      async function openWorkUnit() {
        const value = view.ui.select("work-units").ui.selectedValue();
        if (isEmpty(value)) { return; }
        const win = await $(app.controller).loadController("WorkUnit");
        win.ui.show(function(ctrl) {
          ctrl.configure(intakeQueueId, parseInt(value));
        });
      }
      this.openWorkUnit = openWorkUnit;

      /**
       * Open new window for every work unit selected in the table.
       */
      async function openSelectedWorkUnits() {
        let opts = view.ui.select("work-units").ui.selectedValues();
        for (let i = 0; i < opts.length; i++) {
          let value = parseInt(opts[i]);
          let win = await $(app.controller).loadController("WorkUnit");
          win.ui.show(function(ctrl) {
            ctrl.configure(parseInt(value));
          });
        }
      }
      this.openSelectedWorkUnits = openSelectedWorkUnits;

      async function viewDidLoad() {
        if (isEmpty(intakeQueueId)) { return; }

        view.ui.button("open-work-units").disabled = true;

        let response;
        try {
          response = await os.network.get(`/lean/work-units/${intakeQueueId}`);
        }
        catch (error) {
          os.ui.showError(error.message);
          return;
        }
        view.ui.span("intake-queue-name").textContent = response.name;
        const listBox = view.ui.select("work-units").ui;
        listBox.delegate = {
          didSelectListBoxOption: function(option) {
            view.ui.button("open-work-units").disabled = !listBox.hasSelectedOption();
          },
          didDeselectListBoxOption: function(option) {
            view.ui.button("open-work-units").disabled = !listBox.hasSelectedOption();
          },
          didRemoveAllOptions: function() { },
          didChangePositionOfListBoxOptions: async function(options, newPosition) {
            return os.network.patch("/lean/work-unit-position", {
              position: newPosition,
              workUnitIds: options.map(function(o) {
                return parseInt(o.value);
              })
            })
            .then(data => {
              listBox.deselectAllOptions();
              view.ui.button("open-work-units").disabled = true;
              return data;
            });
          }
        };
        listBox.addNewOptions(response.workUnits);
      }
      this.viewDidLoad = viewDidLoad;
    }
  </script>
  <div class="top">
    <div class="close-button"></div>
    <div class="title"><span>Work Units</span></div>
  </div>
  <div class="container vbox gap-10">
    <div class="read-only">
      <label class="wider">Intake Queue</label>
      <span name="intake-queue-name">—</span>
    </div>
    <div class="hbox gap-10">
      <div class="width: 500px;">
        <h2>Work Units</h2>
        <div class="ui-list-box sortable" style="width: auto; height: 200px;">
          <select name="work-units" multiple></select>
        </div>
      </div>
      <div class="controls-right">
        <button name="open-work-units" class="default" onclick="$(this.controller).openSelectedWorkUnits();">Open</button>
      </div>
    </div>
  </div>
</div>
