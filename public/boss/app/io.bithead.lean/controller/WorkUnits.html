<div class="ui-window">
  <script type="text/javascript">
    function $(this.id)(view) {
      let intakeQueueId = null;

      /**
       * @param {int} _intakeQueueId - The ID of the intake queue whose work units to display
       */
      function configure(_intakeQueueId) {
        intakeQueueId = _intakeQueueId;
      }
      this.configure = configure;

      function didChangePositionOfListBoxOption(option) {
        // TODO: Save new work unit order
      }
      this.didChangePositionOfListBoxOption = didChangePositionOfListBoxOption;

      async function openWorkUnit() {
        const value = view.ui.select("work-units").ui.selectedValue();
        if (isEmpty(value)) { return; }
        const win = await $(app.controller).loadController("WorkUnit");
        win.ui.show(function(ctrl) {
          ctrl.configure(intakeQueueId, parseInt(value));
        });
      }
      this.openWorkUnit = openWorkUnit;

      async function viewDidLoad() {
        if (isEmpty(intakeQueueId)) { return; }
        let response;
        try {
          response = await os.network.get(`/lean/work-units/${intakeQueueId}`);
        }
        catch (error) {
          os.ui.showError(error.message);
          return;
        }
        view.ui.span("intake-queue-name").textContent = response.name;
        const listBox = view.ui.select("work-units").ui;
        listBox.delegate = {
          didSelectListBoxOption: function(option) { },
          didRemoveAllOptions: function() { },
          didChangePositionOfListBoxOption: function(option) {
            return didChangePositionOfListBoxOption(option);
          }
        };
        listBox.setDefaultAction(openWorkUnit);
        listBox.addNewOptions(response.workUnits);
      }
      this.viewDidLoad = viewDidLoad;
    }
  </script>
  <div class="top">
    <div class="close-button"></div>
    <div class="title"><span>Work Units</span></div>
  </div>
  <div class="container vbox gap-10" style="width: 600px">
    <div class="read-only">
      <label class="wider">Intake Queue</label>
      <span name="intake-queue-name">—</span>
    </div>
    <div>
      <h2>Work Units</h2>
      <div class="ui-list-box sortable" style="width: auto; height: 200px;">
        <select name="work-units"></select>
      </div>
    </div>
  </div>
</div>
