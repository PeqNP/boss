<div class="ui-window">
  <script type="text/javascript">
    function $(this.id)(view) {
      let supplyFieldId = null;
      let supplyFieldOptionId = null;

      let delegate = protocol(
        "SupplyFieldOptionDelegate", this, "delegate",
        [
          "didSaveSupplyFieldOption",
          "didDeleteSupplyFieldOption"
        ]
      );

      /**
       * @param {int} _supplyFieldId
       * @param {int|null} _supplyFieldOptionId
       */
      function configure(_supplyFieldId, _supplyFieldOptionId) {
        supplyFieldId = _supplyFieldId;
        supplyFieldOptionId = _supplyFieldOptionId;
      }
      this.configure = configure;

      async function save() {
        const name = view.ui.inputValue("name", "Please provide a name.");
        if (isEmpty(name)) {
          return;
        }
        const hidden = view.ui.input("hidden").checked;
        const body = { supplyFieldId, name, hidden };
        try {
          if (isEmpty(supplyFieldOptionId)) {
            await os.network.post("/lean/supply-field-option", body);
          } else {
            await os.network.put(`/lean/supply-field-option/${supplyFieldOptionId}`, body);
          }
        } catch {
          os.ui.showError("Failed to save supply field option. Please try again later.");
          return;
        }
        delegate.didSaveSupplyFieldOption();
        view.ui.close();
      }
      this.save = save;

      function _delete() {
        os.ui.showDelete("Are you sure you want to delete this option?", null, async function() {
          try {
            await os.network.delete(`/lean/supply-field-option/${supplyFieldOptionId}`);
          } catch {
            os.ui.showError("Failed to delete supply field option. Please try again later.");
            return;
          }
          delegate.didDeleteSupplyFieldOption();
          view.ui.close();
        });
      }
      this.delete = _delete;

      function cancel() {
        view.ui.close();
      }
      this.cancel = cancel;

      async function viewDidLoad() {
        if (isEmpty(supplyFieldOptionId)) {
          return;
        }
        let response;
        try {
          response = await os.network.get(`/lean/supply-field-option/${supplyFieldOptionId}`);
        } catch {
          os.ui.showError("Failed to load supply field option. Please try again later.");
          return;
        }
        view.ui.input("id").value = response.id;
        view.ui.input("name").value = response.name;
        view.ui.input("hidden").checked = response.hidden ?? false;
      }
      this.viewDidLoad = viewDidLoad;

      function viewDidAppear() {
        view.ui.input("name").focus();
      }
      this.viewDidAppear = viewDidAppear;

      this.didHitEnter = save;
    }
  </script>
  <div class="top">
    <div class="close-button"></div>
    <div class="title"><span>Supply Field Option</span></div>
    <div class="zoom-button"></div>
  </div>
  <div class="container vbox gap-10" style="width: 360px">
    <input type="hidden" name="id">
    <div class="text-field">
      <label for="name">Name</label>
      <input type="text" name="name" autocomplete="new-password">
    </div>
    <div class="checkbox-field">
      <label class="checkbox">
        <input type="checkbox" name="hidden"> Hidden
      </label>
    </div>
    <div class="controls">
      <button class="primary" onclick="$(this.controller).cancel();">Cancel</button>
      <button class="primary" onclick="$(this.controller).delete();">Delete</button>
      <button class="default" onclick="$(this.controller).save();">Save</button>
    </div>
  </div>
</div>
