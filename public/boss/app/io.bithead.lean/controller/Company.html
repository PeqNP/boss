<div class="ui-window">
  <script type="text/javascript">
    function $(this.id)(view) {
      let companyId = null;

      /**
       * @param {int} _companyId - The ID of the company to edit
       */
      function configure(_companyId) {
        companyId = _companyId;
      }
      this.configure = configure;

      async function viewDidLoad() {
        if (isEmpty(companyId)) { return; }
        let response;
        try {
          response = await os.network.get(`/lean/company/${companyId}`);
        }
        catch {
          os.ui.showError("Failed to load company. Please try again later.");
          return;
        }
        view.ui.input("id").value = response.id;
        view.ui.input("name").value = response.name;
        view.ui.span("owner-name").textContent = response.userName;
      }
      this.viewDidLoad = viewDidLoad;

      function viewDidAppear() {
        view.ui.input("name").focus();
      }
      this.viewDidAppear = viewDidAppear;

      async function save() {
        const name = view.ui.inputValue("name", "Please provide a name.");
        try {
          await os.network.post("/lean/company", { companyId, name });
        }
        catch {
          os.ui.showError("Failed to save company. Please try again later.");
          return;
        }
        view.ui.close();
      }
      this.save = save;

      function cancel() {
        view.ui.close();
      }
      this.cancel = cancel;

      this.didHitEnter = save;
    }
  </script>
  <div class="top">
    <div class="close-button"></div>
    <div class="title"><span>Company</span></div>
    <div class="zoom-button"></div>
  </div>
  <div class="container vbox gap-10" style="width: 420px">
    <input type="hidden" name="id">
    <div class="text-field">
      <label for="name">Name</label>
      <input type="text" name="name">
    </div>
    <div class="read-only">
      <label>Owner</label>
      <span name="owner-name"></span>
    </div>
    <div class="controls">
      <button class="default" onclick="$(this.controller).cancel();">Cancel</button>
      <button class="primary" onclick="$(this.controller).save();">Save</button>
    </div>
  </div>
</div>
