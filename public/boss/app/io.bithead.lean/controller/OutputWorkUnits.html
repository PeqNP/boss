<div class="ui-window">
  <script type="text/javascript">
    function $(this.id)(view) {
      let outputId = null;

      /**
       * @param {int} _outputId - The ID of the output whose work units to display
       */
      function configure(_outputId) {
        outputId = _outputId;
      }
      this.configure = configure;

      function cancel() {
        view.ui.close();
      }
      this.cancel = cancel;
    }
  </script>
  <div class="top">
    <div class="close-button"></div>
    <div class="title"><span>Output Work Units</span></div>
    <div class="zoom-button"></div>
  </div>
  <div class="container vbox gap-10" style="width: 420px">
    <div class="controls">
      <button class="primary" onclick="$(this.controller).cancel();">Cancel</button>
    </div>
  </div>
</div>
