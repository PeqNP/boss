<div class="ui-window">
  <script type="text/javascript">
    function $(this.id)(view) {
      let companyId = null;
      let supplyId = null;
      let theme = null;

      let delegate = protocol(
        "SupplyDelegate", this, "delegate",
        [
          /**
           * @param {Supply} supply - The saved supply.
           */
          "didSaveSupply",
          /**
           * Called when the supply was deleted.
           */
          "didDeleteSupply"
        ]
      );

      // SupplyFieldDelegate
      let supplyFieldDelegate = {
        didSaveSupplyField: loadFields,
        didDeleteSupplyField: loadFields
      };

      /**
       * @param {int} _companyId - The ID of the company that owns this supply.
       * @param {int} _supplyId - The ID of the supply to edit.
       */
      function configure(_companyId, _supplyId) {
        companyId = _companyId;
        supplyId = _supplyId;
      }
      this.configure = configure;

      async function loadFields() {
        let response;
        try {
          response = await os.network.get(`/lean/supply/${supplyId}/fields`);
        }
        catch {
          os.ui.showError("Failed to load supply fields. Please try again later.");
          return;
        }
        view.ui.select("supply-fields").ui.addNewOptions(response);
      }
      this.loadFields = loadFields;

      async function addField() {
        const win = await $(app.controller).loadController("SupplyField");
        win.ui.show(function(ctrl) {
          ctrl.configure(new SupplyFieldConfig(parseInt(supplyId), companyId, null));
          ctrl.delegate = supplyFieldDelegate;
        });
      }
      this.addField = addField;

      async function openField() {
        const values = view.ui.select("supply-fields").ui.selectedValues();
        for (let i = 0; i < values.length; i++) {
          const win = await $(app.controller).loadController("SupplyField");
          win.ui.show(function(ctrl) {
            ctrl.configure(new SupplyFieldConfig(parseInt(supplyId), companyId, parseInt(values[i])));
            ctrl.delegate = supplyFieldDelegate;
          });
        }
      }
      this.openField = openField;

      async function save() {
        const name = view.ui.inputValue("name", "Please provide a name.");
        if (isEmpty(name)) {
          return;
        }
        const amountRaw = view.ui.input("amount").value.trim();
        const amount = isEmpty(amountRaw) ? null : parseInt(amountRaw, 10);
        let response;
        try {
          response = await os.network.put(`/lean/supply/${supplyId}`, { name, theme, amount });
        }
        catch {
          os.ui.showError("Failed to save supply. Please try again later.");
          return;
        }
        delegate.didSaveSupply(response);
        view.ui.close();
      }
      this.save = save;

      function _delete() {
        os.ui.showDelete("Are you sure you want to delete this supply?", null, async function() {
          try {
            await os.network.delete(`/lean/supply/${supplyId}`);
          }
          catch {
            os.ui.showError("Failed to delete supply. Please try again later.");
            return;
          }
          delegate.didDeleteSupply();
          view.ui.close();
        });
      }
      this.delete = _delete;

      function cancel() {
        view.ui.close();
      }
      this.cancel = cancel;

      async function viewDidLoad() {
        view.ui.button("open-field").disabled = true;
        const fieldsListBox = view.ui.select("supply-fields").ui;
        fieldsListBox.delegate = {
          didSelectListBoxOption: function(option) {
            view.ui.button("open-field").disabled = !fieldsListBox.hasSelectedOption();
          },
          didDeselectListBoxOption: function(option) {
            view.ui.button("open-field").disabled = !fieldsListBox.hasSelectedOption();
          },
          didRemoveAllOptions: function() {
            view.ui.button("open-field").disabled = true;
          },
          didChangePositionOfListBoxOptions: function(options, newPosition) {
            return os.network.patch(`/lean/supply/${supplyId}/field-positions`, {
              position: newPosition,
              supplyFieldIds: options.map(function(o) { return parseInt(o.value); })
            });
          }
        };

        let response;
        try {
          response = await os.network.get(`/lean/supply/${supplyId}`);
        }
        catch {
          os.ui.showError("Failed to load supply. Please try again later.");
          return;
        }
        view.ui.input("name").value = response.name;
        if (!isEmpty(response.amount)) {
          view.ui.input("amount").value = response.amount;
        }
        theme = response.theme;
        %(theme).configure(theme);
        %(theme).delegate = {
          didSelectTheme: function(_theme) {
            theme = _theme;
          }
        };
        if (response.fields.length > 0) {
          fieldsListBox.addNewOptions(response.fields);
          view.ui.details("fields-accordion").open = true;
        }
      }
      this.viewDidLoad = viewDidLoad;

      function viewDidAppear() {
        view.ui.input("name").focus();
      }
      this.viewDidAppear = viewDidAppear;

      this.didHitEnter = save;
    }
  </script>
  <div class="top">
    <div class="close-button"></div>
    <div class="title"><span>Supply</span></div>
    <div class="zoom-button"></div>
  </div>
  <div class="container vbox gap-10" style="width: 400px">
    <div class="text-field">
      <label for="name">Name</label>
      <input type="text" name="name" autocomplete="new-password">
    </div>
    <div class="text-field">
      <label for="amount">Amount</label>
      <input type="number" name="amount" min="1" placeholder="Optional">
    </div>

    EmbedController(ThemeController)

    <details class="ui-accordion" name="fields-accordion" closed>
      <summary>Fields</summary>
      <div class="vbox gap-10">
        <div class="info-message">Fields are necessary only when operator input is required for this supply.</div>
        <div class="hbox gap-10">
          <div class="ui-list-box sortable" style="width: auto; height: 100px;">
            <select name="supply-fields" multiple></select>
          </div>
          <div class="controls-right separated">
            <div class="vbox gap-10">
              <button class="primary" onclick="$(this.controller).addField();">Add</button>
            </div>
            <div class="vbox gap-10">
              <button name="open-field" class="primary" disabled onclick="$(this.controller).openField();">Open</button>
            </div>
          </div>
        </div>
      </div>
    </details>
    <div class="controls">
      <button class="primary" onclick="$(this.controller).cancel();">Cancel</button>
      <button class="primary" onclick="$(this.controller).delete();">Delete</button>
      <button class="default" onclick="$(this.controller).save();">Save</button>
    </div>
  </div>
</div>
