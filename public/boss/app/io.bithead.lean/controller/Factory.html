<div class="ui-window">
  <script type="text/javascript">
    function $(this.id)(view) {
      let factoryId = null;
      let companyId = null;

      async function save() {
        const name = view.ui.inputValue("name", "Please provide a name.");
        try {
          await os.network.post("/lean/factory", { companyId, factoryId, name });
        }
        catch {
          os.ui.showError("Failed to save factory. Please try again later.");
          return;
        }
        view.ui.close();
      }
      this.save = save;

      function _delete() {
        os.ui.showDelete("Are you sure you want to delete this factory?", null, async function() {
          try {
            await os.network.delete(`/lean/factory/${factoryId}`);
          }
          catch {
            os.ui.showError("Failed to delete factory. Please try again later.");
            return;
          }
          view.ui.close();
        });
      }
      this.delete = _delete;

      function cancel() {
        view.ui.close();
      }
      this.cancel = cancel;

      /**
       * @param {int|null} _companyId - The ID of the company (required when creating)
       * @param {int|null} _factoryId - The ID of the factory to edit, or null to create
       */
      function configure(_companyId, _factoryId) {
        companyId = _companyId;
        factoryId = _factoryId;
      }
      this.configure = configure;

      async function viewDidLoad() {
        if (isEmpty(factoryId)) { return; }
        let response;
        try {
          response = await os.network.get(`/lean/factory/${factoryId}`);
        }
        catch {
          os.ui.showError("Failed to load factory. Please try again later.");
          return;
        }
        view.ui.input("name").value = response.name;
      }
      this.viewDidLoad = viewDidLoad;

      function viewDidAppear() {
        view.ui.input("name").focus();
      }
      this.viewDidAppear = viewDidAppear;

      this.didHitEnter = save;
    }
  </script>
  <div class="top">
    <div class="close-button"></div>
    <div class="title"><span>Factory</span></div>
    <div class="zoom-button"></div>
  </div>
  <div class="container vbox gap-10" style="width: 420px">
    <div class="text-field">
      <label for="name">Name</label>
      <input type="text" name="name">
    </div>
    <div class="controls">
      <button class="primary" onclick="$(this.controller).cancel();">Cancel</button>
      <button class="primary" onclick="$(this.controller).delete();">Delete</button>
      <button class="default" onclick="$(this.controller).save();">Save</button>
    </div>
  </div>
</div>
