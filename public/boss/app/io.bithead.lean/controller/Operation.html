<div class="ui-window">
  <script type="text/javascript">
    function $(this.id)(view) {
      let stationId = null;
      let companyId = null;
      let operationId = null;
      let agentId = null;

      let delegate = protocol(
        "OperationDelegate", this, "delegate",
        [
          "didSaveOperation",
          "didDeleteOperation"
        ]
      );

      // SupplyRequestDelegate
      let supplyRequestDelegate = {
        didSaveSupplyRequest: loadSupplyRequests,
        didDeleteSupplyRequest: loadSupplyRequests
      };

      /**
       * @param {Object} params
       * @param {int} params.stationId - The ID of the station this operation belongs to
       * @param {int} params.companyId - The ID of the company (for agent search)
       * @param {int|null} params.operationId - The ID of the operation to edit, or null to create
       */
      function configure({ stationId: _stationId, companyId: _companyId, operationId: _operationId }) {
        stationId = _stationId;
        companyId = _companyId;
        operationId = _operationId;
      }
      this.configure = configure;

      async function save() {
        const name = view.ui.inputValue("name", "Please provide a name.");
        if (isEmpty(name)) {
          return;
        }
        try {
          if (isEmpty(operationId)) {
            await os.network.post("/lean/operation", { stationId, name, agentId });
          }
          else {
            await os.network.put(`/lean/operation/${operationId}`, { name, agentId });
          }
        }
        catch {
          os.ui.showError("Failed to save operation. Please try again later.");
          return;
        }
        delegate.didSaveOperation();
        view.ui.close();
      }
      this.save = save;

      function _delete() {
        os.ui.showDelete("Are you sure you want to delete this operation?", null, async function() {
          try {
            await os.network.delete(`/lean/operation/${operationId}`);
          }
          catch {
            os.ui.showError("Failed to delete operation. Please try again later.");
            return;
          }
          delegate.didDeleteOperation();
          view.ui.close();
        });
      }
      this.delete = _delete;

      function cancel() {
        view.ui.close();
      }
      this.cancel = cancel;

      async function loadSupplyRequests() {
        let response;
        try {
          response = await os.network.get(`/lean/operation/${operationId}/supply-requests`);
        }
        catch {
          os.ui.showError("Failed to load supply requests. Please try again later.");
          return;
        }
        view.ui.select("operation-supply-requests").ui.addNewOptions(response);
      }
      this.loadSupplyRequests = loadSupplyRequests;

      async function addSupplyRequest() {
        const win = await $(app.controller).loadController("SupplyRequest");
        win.ui.show(function(ctrl) {
          ctrl.configure({ operationId, companyId, supplyRequestType: null });
          ctrl.delegate = supplyRequestDelegate;
        });
      }
      this.addSupplyRequest = addSupplyRequest;

      async function openSupplyRequest() {
        const values = view.ui.select("operation-supply-requests").ui.selectedValues();
        for (let i = 0; i < values.length; i++) {
          const win = await $(app.controller).loadController("SupplyRequest");
          win.ui.show(function(ctrl) {
            ctrl.configure({ operationId, companyId, supplyRequestType: values[i] });
            ctrl.delegate = supplyRequestDelegate;
          });
        }
      }
      this.openSupplyRequest = openSupplyRequest;

      async function viewDidLoad() {
        const agentMenu = view.ui.select("agent").ui;
        agentMenu.delegate = {
          didFocusSearchMenu: async function(initialize) {
            if (!initialize) {
              return null;
            }
            if (isEmpty(companyId)) {
              return [];
            }
            return os.network.get(`/lean/suggested-agents/${companyId}`);
          },
          didSearchForTerm: async function(term) {
            if (isEmpty(companyId)) {
              return [];
            }
            return os.network.get(`/lean/find-agents/${companyId}?q=${encodeURIComponent(term)}`);
          },
          didSelectOption: function(option) {
            agentId = parseInt(option.value);
          },
          didDeselectOption: function() {
            agentId = null;
          }
        };

        view.ui.button("open-supply-request").disabled = true;
        const supplyRequestsListBox = view.ui.select("operation-supply-requests").ui;
        supplyRequestsListBox.delegate = {
          didSelectListBoxOption: function(option) {
            view.ui.button("open-supply-request").disabled = !supplyRequestsListBox.hasSelectedOption();
          },
          didDeselectListBoxOption: function(option) {
            view.ui.button("open-supply-request").disabled = !supplyRequestsListBox.hasSelectedOption();
          },
          didRemoveAllOptions: function() {
            view.ui.button("open-supply-request").disabled = true;
          },
          didChangePositionOfListBoxOptions: function(options, newPosition) {
            return os.network.patch(`/lean/operation/${operationId}/supply-request-positions`, {
              position: newPosition,
              supplyRequestTypes: options.map(function(o) { return o.value; })
            });
          }
        };

        if (isEmpty(operationId)) {
          return;
        }
        let response;
        try {
          response = await os.network.get(`/lean/operation/${operationId}`);
        }
        catch {
          os.ui.showError("Failed to load operation. Please try again later.");
          return;
        }
        view.ui.input("id").value = response.id;
        view.ui.input("name").value = response.name;
        if (!isEmpty(response.agent)) {
          agentId = parseInt(response.agent.id);
          agentMenu.selectOption(response.agent);
        }
        supplyRequestsListBox.addNewOptions(response.supplyRequests);
      }
      this.viewDidLoad = viewDidLoad;

      function viewDidAppear() {
        view.ui.input("name").focus();
      }
      this.viewDidAppear = viewDidAppear;

      this.didHitEnter = save;
    }
  </script>
  <div class="ui-menus">
    <div class="ui-menu" style="width: 140px;">
      <select name="file-menu">
        <option>File</option>
        <option onclick="$(this.controller).save();">Save</option>
        <option class="group"></option>
        <option onclick="$(this.controller).delete();">Delete</option>
        <option class="group"></option>
        <option onclick="$(this.controller).cancel();">Cancel</option>
      </select>
    </div>
  </div>
  <div class="top">
    <div class="close-button"></div>
    <div class="title"><span>Operation</span></div>
    <div class="zoom-button"></div>
  </div>
  <div class="container vbox gap-10" style="width: 400px">
    <input type="hidden" name="id">
    <div class="text-field">
      <label for="name">Name</label>
      <input type="text" name="name" autocomplete="new-password">
    </div>
    <div class="ui-search-menu">
      <label for="agent">Agent</label>
      <select name="agent">
        <option>Assign agent…</option>
      </select>
    </div>
    <details class="ui-accordion" open>
      <summary>Supply requests</summary>
      <div class="hbox gap-10">
        <div class="ui-list-box sortable" style="width: auto; height: 100px;">
          <select name="operation-supply-requests" multiple></select>
        </div>
        <div class="controls-right separated">
          <div class="vbox gap-10">
            <button class="primary" onclick="$(this.controller).addSupplyRequest();">Add</button>
          </div>
          <div class="vbox gap-10">
            <button name="open-supply-request" class="primary" disabled onclick="$(this.controller).openSupplyRequest();">Open</button>
          </div>
        </div>
      </div>
    </details>
    <div class="controls">
      <button class="primary" onclick="$(this.controller).cancel();">Cancel</button>
      <button class="primary" onclick="$(this.controller).delete();">Delete</button>
      <button class="default" onclick="$(this.controller).save();">Save</button>
    </div>
  </div>
</div>
