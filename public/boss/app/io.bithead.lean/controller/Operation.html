<div class="ui-window">
  <script type="text/javascript">
    function $(this.id)(view) {
      let stationId = null;
      let companyId = null;
      let operationId = null;
      let agentId = null;
      let supplyRequestType = null;
      let inventoryId = null;
      let supplyId = null;
      let intakeQueueId = null;

      let delegate = protocol(
        "OperationDelegate", this, "delegate",
        [
          "didSaveOperation",
          "didDeleteOperation"
        ]
      );

      /**
       * @param {Object} params
       * @param {int} params.stationId - The ID of the station this operation belongs to
       * @param {int} params.companyId - The ID of the company (for agent/supply search)
       * @param {int|null} params.operationId - The ID of the operation to edit, or null to create
       */
      function configure({ stationId: _stationId, companyId: _companyId, operationId: _operationId }) {
        stationId = _stationId;
        companyId = _companyId;
        operationId = _operationId;
      }
      this.configure = configure;

      function supplyRequestTypeChanged(value) {
        supplyRequestType = value === "none" ? null : value;
        view.ui.div("inventory-fields").style.display = value === "inventory" ? "" : "none";
        view.ui.div("supply-fields").style.display = value === "supply" ? "" : "none";
        view.ui.div("work-units-fields").style.display = value === "workUnits" ? "" : "none";
      }
      this.supplyRequestTypeChanged = supplyRequestTypeChanged;

      async function addSupply() {
        const win = await $(app.controller).loadController("Supply");
        win.ui.show(function(ctrl) {
          ctrl.configure({ companyId, supplyId: null });
          ctrl.delegate = {
            didSaveSupply: function(option) {
              supplyId = parseInt(option.id);
              view.ui.select("supply").ui.selectOption(option);
            },
            didDeleteSupply: function() {}
          };
        });
      }
      this.addSupply = addSupply;

      async function save() {
        const name = view.ui.inputValue("name", "Please provide a name.");
        if (isEmpty(name)) {
          return;
        }
        let body = { name, agentId, supplyRequestType };
        if (supplyRequestType === "inventory") {
          if (isEmpty(inventoryId)) {
            os.ui.showError("Please select an inventory.");
            return;
          }
          const amount = parseInt(view.ui.input("amount").value, 10);
          if (isNaN(amount) || amount < 1) {
            os.ui.showError("Please provide a valid amount.");
            return;
          }
          body.inventoryId = inventoryId;
          body.amount = amount;
        }
        else if (supplyRequestType === "supply") {
          if (isEmpty(supplyId)) {
            os.ui.showError("Please select a supply.");
            return;
          }
          body.supplyId = supplyId;
        }
        else if (supplyRequestType === "workUnits") {
          if (isEmpty(intakeQueueId)) {
            os.ui.showError("Please select an intake queue.");
            return;
          }
          body.intakeQueueId = intakeQueueId;
        }
        try {
          if (isEmpty(operationId)) {
            await os.network.post("/lean/operation", { stationId, ...body });
          }
          else {
            await os.network.put(`/lean/operation/${operationId}`, body);
          }
        }
        catch {
          os.ui.showError("Failed to save operation. Please try again later.");
          return;
        }
        delegate.didSaveOperation();
        view.ui.close();
      }
      this.save = save;

      function _delete() {
        os.ui.showDelete("Are you sure you want to delete this operation?", null, async function() {
          try {
            await os.network.delete(`/lean/operation/${operationId}`);
          }
          catch {
            os.ui.showError("Failed to delete operation. Please try again later.");
            return;
          }
          delegate.didDeleteOperation();
          view.ui.close();
        });
      }
      this.delete = _delete;

      function cancel() {
        view.ui.close();
      }
      this.cancel = cancel;

      async function viewDidLoad() {
        const agentMenu = view.ui.select("agent").ui;
        agentMenu.delegate = {
          didFocusSearchMenu: async function(initialize) {
            if (!initialize) {
              return null;
            }
            if (isEmpty(companyId)) {
              return [];
            }
            return os.network.get(`/lean/suggested-agents/${companyId}`);
          },
          didSearchForTerm: async function(term) {
            if (isEmpty(companyId)) {
              return [];
            }
            return os.network.get(`/lean/find-agents/${companyId}?q=${encodeURIComponent(term)}`);
          },
          didSelectOption: function(option) {
            agentId = parseInt(option.value);
          },
          didDeselectOption: function() {
            agentId = null;
          }
        };

        const inventoryMenu = view.ui.select("inventory").ui;
        inventoryMenu.delegate = {
          didFocusSearchMenu: async function(initialize) {
            if (!initialize) {
              return null;
            }
            if (isEmpty(companyId)) {
              return [];
            }
            return os.network.get(`/lean/suggested-inventories/${companyId}`);
          },
          didSearchForTerm: async function(term) {
            if (isEmpty(companyId)) {
              return [];
            }
            return os.network.get(`/lean/find-inventories/${companyId}?q=${encodeURIComponent(term)}`);
          },
          didSelectOption: function(option) {
            inventoryId = parseInt(option.value);
          },
          didDeselectOption: function() {
            inventoryId = null;
          }
        };

        const supplyMenu = view.ui.select("supply").ui;
        supplyMenu.delegate = {
          didFocusSearchMenu: async function(initialize) {
            if (!initialize) {
              return null;
            }
            if (isEmpty(companyId)) {
              return [];
            }
            return os.network.get(`/lean/suggested-supplies/${companyId}`);
          },
          didSearchForTerm: async function(term) {
            if (isEmpty(companyId)) {
              return [];
            }
            return os.network.get(`/lean/find-supplies/${companyId}?q=${encodeURIComponent(term)}`);
          },
          didSelectOption: function(option) {
            supplyId = parseInt(option.value);
          },
          didDeselectOption: function() {
            supplyId = null;
          }
        };

        const intakeQueueMenu = view.ui.select("intake-queue").ui;
        intakeQueueMenu.delegate = {
          didFocusSearchMenu: async function(initialize) {
            if (!initialize) {
              return null;
            }
            if (isEmpty(companyId)) {
              return [];
            }
            return os.network.get(`/lean/suggested-intake-queues/${companyId}`);
          },
          didSearchForTerm: async function(term) {
            if (isEmpty(companyId)) {
              return [];
            }
            return os.network.get(`/lean/find-intake-queues/${companyId}?q=${encodeURIComponent(term)}`);
          },
          didSelectOption: function(option) {
            intakeQueueId = parseInt(option.value);
          },
          didDeselectOption: function() {
            intakeQueueId = null;
          }
        };

        if (isEmpty(operationId)) {
          return;
        }
        let response;
        try {
          response = await os.network.get(`/lean/operation/${operationId}`);
        }
        catch {
          os.ui.showError("Failed to load operation. Please try again later.");
          return;
        }
        view.ui.input("id").value = response.id;
        view.ui.input("name").value = response.name;
        if (!isEmpty(response.agent)) {
          agentId = parseInt(response.agent.id);
          agentMenu.selectOption(response.agent);
        }
        const sr = response.supplyRequest;
        if (!isEmpty(sr)) {
          supplyRequestType = sr.type;
          view.ui.radio("supply-request-type", sr.type).checked = true;
          supplyRequestTypeChanged(sr.type);
          if (sr.type === "inventory" && !isEmpty(sr.inventory)) {
            inventoryId = parseInt(sr.inventory.id);
            inventoryMenu.selectOption(sr.inventory);
            view.ui.input("amount").value = sr.amount ?? 1;
          }
          else if (sr.type === "supply" && !isEmpty(sr.supply)) {
            supplyId = parseInt(sr.supply.id);
            supplyMenu.selectOption(sr.supply);
          }
          else if (sr.type === "workUnits" && !isEmpty(sr.intakeQueue)) {
            intakeQueueId = parseInt(sr.intakeQueue.id);
            intakeQueueMenu.selectOption(sr.intakeQueue);
          }
        }
      }
      this.viewDidLoad = viewDidLoad;

      function viewDidAppear() {
        view.ui.input("name").focus();
      }
      this.viewDidAppear = viewDidAppear;

      this.didHitEnter = save;
    }
  </script>
  <div class="top">
    <div class="close-button"></div>
    <div class="title"><span>Operation</span></div>
    <div class="zoom-button"></div>
  </div>
  <div class="container vbox gap-10" style="width: 400px">
    <input type="hidden" name="id">
    <div class="text-field">
      <label for="name">Name</label>
      <input type="text" name="name" autocomplete="new-password">
    </div>
    <div class="ui-search-menu">
      <label for="agent">Agent</label>
      <select name="agent">
        <option>Assign agent…</option>
      </select>
    </div>
    <fieldset class="vbox gap-10">
      <legend>Supply request</legend>
      <ul class="simple-list">
        <li><label class="radio"><input type="radio" name="supply-request-type" value="none"       onchange="$(this.controller).supplyRequestTypeChanged(this.value);" checked> None</label></li>
        <li><label class="radio"><input type="radio" name="supply-request-type" value="inventory"  onchange="$(this.controller).supplyRequestTypeChanged(this.value);"> Inventory</label></li>
        <li><label class="radio"><input type="radio" name="supply-request-type" value="supply"     onchange="$(this.controller).supplyRequestTypeChanged(this.value);"> Supply</label></li>
        <li><label class="radio"><input type="radio" name="supply-request-type" value="workUnits"  onchange="$(this.controller).supplyRequestTypeChanged(this.value);"> Work units</label></li>
      </ul>
      <div name="inventory-fields" style="display: none;" class="vbox gap-10">
        <div class="info-message">Inventory required by the operation.</div>
        <div class="ui-search-menu">
          <label for="inventory">Inventory</label>
          <select name="inventory">
            <option>Search inventory…</option>
          </select>
        </div>
        <div class="text-field">
          <label for="amount">Amount</label>
          <input type="number" name="amount" min="1" value="1">
        </div>
      </div>
      <div name="supply-fields" style="display: none;" class="vbox gap-10">
        <div class="info-message">A required value to be fulfilled by the operator.</div>
        <div class="ui-search-menu">
          <label for="supply">Supply</label>
          <select name="supply">
            <option>Search supplies…</option>
          </select>
        </div>
        <button class="primary" onclick="$(this.controller).addSupply();">Add supply</button>
      </div>
      <div name="work-units-fields" style="display: none;" class="vbox gap-10">
        <div class="info-message">An operator must create, or associate, a work unit created by the selected intake queue in order to be fulfilled.</div>
        <div class="ui-search-menu">
          <label for="intake-queue" class="wider">Intake queue</label>
          <select name="intake-queue">
            <option>Search queues…</option>
          </select>
        </div>
      </div>
    </fieldset>
    <div class="controls">
      <button class="primary" onclick="$(this.controller).cancel();">Cancel</button>
      <button class="primary" onclick="$(this.controller).delete();">Delete</button>
      <button class="default" onclick="$(this.controller).save();">Save</button>
    </div>
  </div>
</div>
