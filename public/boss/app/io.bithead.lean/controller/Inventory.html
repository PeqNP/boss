<div class="ui-window">
  <script type="text/javascript">
    function $(this.id)(view) {
      let inventoryId = null;

      /**
       * @param {int} _inventoryId - The ID of the inventory to edit
       */
      function configure(_inventoryId) {
        inventoryId = _inventoryId;
      }
      this.configure = configure;

      async function viewDidLoad() {
        if (isEmpty(inventoryId)) {
          throw new Error("Inventory controller requires an inventoryId");
        }
        let response;
        try {
          response = await os.network.get(`/lean/inventory/${inventoryId}`);
        }
        catch {
          os.ui.showError("Failed to load inventory. Please try again later.");
          return;
        }
        view.ui.input("name").value = response.name;
      }
      this.viewDidLoad = viewDidLoad;

      async function save() {
        const name = view.ui.inputValue("name", "Please provide a name.");
        if (isEmpty(name)) {
          return;
        }
        try {
          await os.network.put(`/lean/inventory/${inventoryId}`, { name });
        }
        catch {
          os.ui.showError("Failed to save inventory. Please try again later.");
          return;
        }
        view.ui.close();
      }
      this.save = save;

      function cancel() {
        view.ui.close();
      }
      this.cancel = cancel;
    }
  </script>
  <div class="top">
    <div class="close-button"></div>
    <div class="title"><span>Inventory</span></div>
    <div class="zoom-button"></div>
  </div>
  <div class="container vbox gap-10" style="width: 420px">
    <div class="text-field">
      <label for="name">Name</label>
      <input type="text" name="name" autocomplete="new-password">
    </div>
    <div class="controls">
      <button class="primary" onclick="$(this.controller).cancel();">Cancel</button>
      <button class="default" onclick="$(this.controller).save();">Save</button>
    </div>
  </div>
</div>
