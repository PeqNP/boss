<div class="ui-window">
  <script type="text/javascript">
    function $(this.id)(view) {
      async function loadCompanies() {
        let response;
        try {
          response = await os.network.get("/lean/companies");
        }
        catch {
          os.ui.showError("Failed to load companies. Please try again later.");
          return;
        }
        view.ui.select("companies").ui.addNewOptions(response.companies);
      }

      async function addCompany() {
        const win = await $(app.controller).loadController("Company");
        win.ui.show();
      }
      this.addCompany = addCompany;

      async function editCompany() {
        let value = view.ui.select("companies").ui.selectedValue();
        if (isEmpty(value)) { return; }
        const win = await $(app.controller).loadController("Company");
        win.ui.show(function(ctrl) {
          ctrl.configure(parseInt(value));
        });
      }
      this.editCompany = editCompany;

      async function openCompany() {
        let value = view.ui.select("companies").ui.selectedValue();
        if (isEmpty(value)) { return; }
        // TODO: If opening a company, when the factory floor is already opened,
        // the FactoryFloor should compare if the comapny ID is the same. If it
        // isn't, it needs to reload the entire factory floor. It may be easier
        // to simply close the existing FactoryFloor and open a new one.
        const win = await $(app.controller).loadController("FactoryFloor");
        win.ui.show(function(ctrl) {
          ctrl.configure(parseInt(value));
        });
      }
      this.openCompany = openCompany;

      async function viewDidLoad() {
        view.ui.select("companies").ui.delegate = {
          didSelectListBoxOption: function(opt) {
            view.ui.button("edit-company").disabled = false;
            view.ui.button("open-company").disabled = false;
          },
          didRemoveAllOptions: function() {
            view.ui.button("edit-company").disabled = true;
            view.ui.button("open-company").disabled = true;
          }
        };

        await loadCompanies();
      }
      this.viewDidLoad = viewDidLoad;
    }
  </script>
  <div class="top">
    <div class="close-button"></div>
    <div class="title"><span>Lean</span></div>
    <div class="zoom-button"></div>
  </div>
  <div class="container vbox gap-10" style="width: 420px">
    <div class="hbox gap-10">
      <div class="ui-list-box" style="width: 300px; height: 220px;">
        <select name="companies"></select>
      </div>
      <div class="controls-right separated">
        <div class="vbox gap-10">
          <button class="primary" onclick="$(this.controller).addCompany();">Add</button>
        </div>
        <div class="vbox gap-10">
          <button name="edit-company" class="default" disabled onclick="$(this.controller).editCompany();">Edit</button>
          <button name="open-company" class="default" disabled onclick="$(this.controller).openCompany();">Open</button>
        </div>
      </div>
    </div>
  </div>
</div>
