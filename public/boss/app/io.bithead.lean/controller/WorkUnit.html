<div class="ui-window" style="width: 600px;">
  <script type="text/javascript">
    function $(this.id)(view) {
      let workUnitId = null;
      let companyId = null;

      let delegate = protocol(
        "WorkUnitDelegate", this, "delegate",
        [
          /**
           * @param {WorkUnit} workUnit - The saved work unit.
           */
          "didSaveWorkUnit",
          /**
           * Called when the work unit was deleted.
           */
          "didDeleteWorkUnit",
          /**
           * Called when the user cancelled editing the work unit.
           */
          "didCancel"
        ]
      );

      async function openStationWorkspace() {
        if (isEmpty(workUnitId)) {
          return;
        }
        const win = await $(app.controller).loadController("StationWorkspace");
        win.ui.show(function(ctrl) {
          ctrl.configure(workUnitId);
        });
      }
      this.openStationWorkspace = openStationWorkspace;

      async function openOperator(operatorId) {
        if (isEmpty(operatorId)) {
          return;
        }
        const win = await $(app.controller).loadController("Operator");
        win.ui.show(function(ctrl) {
          ctrl.configure(operatorId);
        });
      }
      this.openOperator = openOperator;

      async function addComment() {
        const textarea = view.ui.textarea("new-comment");
        const text = textarea.value.trim();
        if (isEmpty(text)) {
          return;
        }
        try {
          await os.network.post("/lean/work-unit-comment", { workUnitId, text });
        }
        catch {
          os.ui.showError("Failed to add comment. Please try again later.");
          return;
        }
        textarea.value = "";
      }
      this.addComment = addComment;

      function editComment(commentId) {
        const textarea = view.ui.textarea(`comment-text-${commentId}`);
        textarea.dataset.original = textarea.value;
        textarea.disabled = false;
        textarea.focus();
        view.ui.button(`edit-button-${commentId}`).style.display = "none";
        view.ui.button(`cancel-button-${commentId}`).style.display = "";
        view.ui.button(`update-button-${commentId}`).style.display = "";
      }
      this.editComment = editComment;

      function cancelEditComment(commentId) {
        const textarea = view.ui.textarea(`comment-text-${commentId}`);
        textarea.value = textarea.dataset.original;
        textarea.disabled = true;
        view.ui.button(`edit-button-${commentId}`).style.display = "";
        view.ui.button(`cancel-button-${commentId}`).style.display = "none";
        view.ui.button(`update-button-${commentId}`).style.display = "none";
      }
      this.cancelEditComment = cancelEditComment;

      async function updateComment(commentId) {
        const textarea = view.ui.textarea(`comment-text-${commentId}`);
        const text = textarea.value.trim();
        if (isEmpty(text)) {
          return;
        }
        try {
          await os.network.put(`/lean/work-unit-comment/${commentId}`, { text });
        }
        catch {
          os.ui.showError("Failed to update comment. Please try again later.");
          return;
        }
        textarea.disabled = true;
        view.ui.button(`edit-button-${commentId}`).style.display = "";
        view.ui.button(`cancel-button-${commentId}`).style.display = "none";
        view.ui.button(`update-button-${commentId}`).style.display = "none";
      }
      this.updateComment = updateComment;

      function renderComment(comment) {
        const el = document.createElement("div");
        el.className = "vbox gap-5";

        const meta = document.createElement("div");
        meta.textContent = `${comment.operator.name} \u2014 ${comment.createDate}`;

        const textarea = document.createElement("textarea");
        textarea.name = `comment-text-${comment.id}`;
        textarea.rows = 2;
        textarea.value = comment.text;
        textarea.disabled = true;

        const controls = document.createElement("div");
        controls.className = "controls";

        const editBtn = document.createElement("button");
        editBtn.name = `edit-button-${comment.id}`;
        editBtn.className = "primary";
        editBtn.textContent = "Edit";
        const canEdit = comment.operator && parseInt(comment.operator.id) === os.user.id;
        editBtn.disabled = !canEdit;
        editBtn.onclick = function() { editComment(comment.id); };

        const cancelBtn = document.createElement("button");
        cancelBtn.name = `cancel-button-${comment.id}`;
        cancelBtn.className = "primary";
        cancelBtn.textContent = "Cancel";
        cancelBtn.style.display = "none";
        cancelBtn.onclick = function() { cancelEditComment(comment.id); };

        const updateBtn = document.createElement("button");
        updateBtn.name = `update-button-${comment.id}`;
        updateBtn.className = "default";
        updateBtn.textContent = "Update comment";
        updateBtn.style.display = "none";
        updateBtn.onclick = function() { updateComment(comment.id); };

        controls.appendChild(editBtn);
        controls.appendChild(cancelBtn);
        controls.appendChild(updateBtn);

        el.appendChild(meta);
        el.appendChild(textarea);
        el.appendChild(controls);

        return el;
      }

      async function placeHold() {
        if (isEmpty(workUnitId)) {
          return;
        }
        try {
          await os.network.post(`/lean/work-unit/hold/${workUnitId}`, {});
        }
        catch (error) {
          os.ui.showError(error.message);
          return;
        }
        renderHoldStatus(true, "0h");
      }

      async function clearHold() {
        if (isEmpty(workUnitId)) {
          return;
        }
        const win = await $(app.controller).loadController("ClearHold");
        win.ui.show(function(ctrl) {
          ctrl.configure(workUnitId);
          ctrl.delegate = {
            didCancel: function() {},
            didClearHold: function() { renderHoldStatus(false, null); }
          };
        });
      }

      function renderHoldStatus(_onHold, _onHoldElapsed) {
        const container = view.ui.div("on-hold");
        container.classList.add("hbox", "gap-10");
        container.innerHTML = "";
        if (_onHold) {
          const label = document.createElement("span");
          label.textContent = `On hold for ${_onHoldElapsed}`;
          const btn = document.createElement("button");
          btn.className = "primary";
          btn.textContent = "Clear hold";
          btn.onclick = clearHold;
          container.appendChild(label);
          container.appendChild(btn);
        }
        else {
          const btn = document.createElement("button");
          btn.className = "primary";
          btn.textContent = "Place hold";
          btn.onclick = placeHold;
          container.appendChild(btn);
        }
      }

      async function save() {
        const name = view.ui.inputValue("name", "Please provide a name.");
        if (isEmpty(name)) {
          return;
        }
        let response;
        try {
          response = await os.network.put(`/lean/work-unit/${workUnitId}`, { name });
        }
        catch (error) {
          os.ui.showError(error.message);
          return;
        }
        delegate.didSaveWorkUnit(response);
        view.ui.close();
      }
      this.save = save;

      function _delete() {
        if (isEmpty(workUnitId)) {
          return;
        }
        os.ui.showDelete("Are you sure you want to delete this work unit?", null, async function() {
          try {
            await os.network.delete(`/lean/work-unit/${workUnitId}`);
          }
          catch {
            os.ui.showError("Failed to delete work unit. Please try again later.");
            return;
          }
          delegate.didDeleteWorkUnit();
          view.ui.close();
        });
      }
      this.delete = _delete;

      function cancel() {
        delegate.didCancel();
        view.ui.close();
      }
      this.cancel = cancel;

      async function loadChildren() {
        if (isEmpty(workUnitId)) {
          return;
        }
        let children;
        try {
          children = await os.network.get(`/lean/work-unit/children/${workUnitId}`);
        }
        catch {
          os.ui.showError("Failed to load children. Please try again later.");
          return;
        }
        const table = view.ui.table("children");
        while (table.rows.length > 1) { table.deleteRow(1); }
        for (const child of children) {
          renderChildRow(child);
        }
        const accordion = view.ui.details("children");
        if (children.length > 0) {
          accordion.open = true;
        }
      }

      function renderChildRow(child) {
        const table = view.ui.table("children");
        const row = table.insertRow();
        const fullName = `${child.key} ${child.name}`;
        const nameCell = row.insertCell();
        nameCell.textContent = fullName.length > 20 ? fullName.slice(0, 20) + "…" : fullName;
        if (fullName.length > 20) {
          nameCell.title = fullName;
        }
        row.insertCell().textContent = child.eta ?? "—";
        const controls = row.insertCell();
        controls.classList.add("hbox", "gap-5");
        const editBtn = document.createElement("button");
        editBtn.className = "primary";
        editBtn.textContent = "Edit";
        editBtn.onclick = async function() {
          const win = await $(app.controller).loadController("WorkUnit");
          win.ui.show(function(ctrl) {
            ctrl.configure(child.id);
            ctrl.delegate = { didSaveWorkUnit: loadChildren, didDeleteWorkUnit: loadChildren };
          });
        };
        const removeBtn = document.createElement("button");
        removeBtn.className = "primary";
        const removeIcon = document.createElement("img");
        removeIcon.src = "/boss/img/trash-small.svg";
        removeIcon.width = 12;
        removeIcon.height = 12;
        removeBtn.appendChild(removeIcon);
        removeBtn.onclick = async function() {
          os.ui.showDelete("Remove this child work unit?", null, async function() {
            try {
              await os.network.delete(`/lean/work-unit/child/${workUnitId}/${child.id}`);
            }
            catch {
              os.ui.showError("Failed to remove child. Please try again later.");
              return;
            }
            loadChildren();
          });
        };
        controls.appendChild(editBtn);
        controls.appendChild(removeBtn);
      }

      /**
       * @param {int} _workUnitId
       */
      function configure(_workUnitId) {
        workUnitId = parseInt(_workUnitId);
      }
      this.configure = configure;

      async function viewDidLoad() {
        if (isEmpty(workUnitId)) {
          throw new Error("WorkUnit controller requires a workUnitId");
        }

        const reporterMenu = view.ui.select("reporter").ui;
        reporterMenu.delegate = {
          didFocusSearchMenu: async function(initialize) {
            if (!initialize) {
              return null;
            }
            if (isEmpty(companyId)) {
              return [];
            }
            return os.network.get(`/lean/suggested-operators/${companyId}`);
          },
          didSearchForTerm: async function(term) {
            if (isEmpty(companyId)) {
              return [];
            }
            return os.network.get(`/lean/find-operators/${companyId}?q=${encodeURIComponent(term)}`);
          },
          didSelectOption: async function(option) {
            try {
              await os.network.put(`/lean/work-unit/reporter/${workUnitId}`, { operatorId: parseInt(option.value) });
            } catch (error) {
              os.ui.showError(error.message);
            }
          },
          didDeselectOption: async function() {
            try {
              await os.network.put(`/lean/work-unit/reporter/${workUnitId}`, { operatorId: null });
            } catch (error) {
              os.ui.showError(error.message);
            }
          }
        };

        const parentMenu = view.ui.select("parent").ui;
        parentMenu.delegate = {
          didFocusSearchMenu: async function(initialize) {
            if (!initialize) {
              return null;
            }
            if (isEmpty(companyId)) {
              return [];
            }
            return os.network.get(`/lean/suggested-work-unit/${companyId}`);
          },
          didSearchForTerm: async function(term) {
            if (isEmpty(companyId)) {
              return [];
            }
            return os.network.get(`/lean/find-work-unit/${companyId}?q=${encodeURIComponent(term)}`);
          },
          didSelectOption: async function(option) {
            try {
              await os.network.put(`/lean/work-unit/parent/${workUnitId}`, { parentWorkUnitId: parseInt(option.value) });
            } catch (error) {
              os.ui.showError(error.message);
            }
          },
          didDeselectOption: async function() {
            try {
              await os.network.put(`/lean/work-unit/parent/${workUnitId}`, { parentWorkUnitId: null });
            } catch (error) {
              os.ui.showError(error.message);
            }
          }
        };

        const assigneesMenu = view.ui.select("assignees").ui;
        assigneesMenu.delegate = {
          didFocusTokenMenu: async function() {
            if (isEmpty(companyId)) {
              return [];
            }
            return os.network.get(`/lean/suggested-operators/${companyId}`);
          },
          didSearchForTerm: async function(term) {
            if (isEmpty(companyId)) {
              return [];
            }
            return os.network.get(`/lean/find-operators/${companyId}?q=${encodeURIComponent(term)}`);
          },
          didAddToken: async function(option) {
            const ids = Array.from(view.ui.select("assignees").selectedOptions).map(o => parseInt(o.value));
            try {
              await os.network.put(`/lean/work-unit/assignees/${workUnitId}`, { operatorIds: ids });
            } catch (error) {
              os.ui.showError(error.message);
            }
          },
          didRemoveToken: async function(option) {
            const ids = Array.from(view.ui.select("assignees").selectedOptions).map(o => parseInt(o.value));
            try {
              await os.network.put(`/lean/work-unit/assignees/${workUnitId}`, { operatorIds: ids });
            } catch (error) {
              os.ui.showError(error.message);
            }
          }
        };

        let response;
        try {
          response = await os.network.get(`/lean/work-unit/${workUnitId}`);

        }
        catch (error) {
          os.ui.showError(error.message);
          return;
        }
        view.ui.span("key").textContent = response.key;
        view.ui.input("name").value = response.name;
        view.ui.span("eta").textContent = response.eta ?? "—";
        view.ui.span("creator").textContent = response.creator?.name ?? "—";
        renderHoldStatus(response.onHold, response.onHoldElapsed ?? null);

        // Render current line state
        view.ui.fieldset("status").style.display = "";
        if (!isEmpty(response.intakeQueueState)) {
          view.ui.span("state-intake-queue").textContent = response.intakeQueueState.name;
          view.ui.span("state-intake-queue").closest(".read-only").style.display = "";
        }
        else if (!isEmpty(response.stationState)) {
          const s = response.stationState;
          view.ui.span("state-station-name").textContent = s.name;
          view.ui.span("state-operation-name").textContent = s.operationName ?? "—";
          view.ui.span("state-operation-status").textContent = s.operationStatus ?? "—";
          view.ui.div("state-station").style.display = "";
        }
        else if (!isEmpty(response.outputState)) {
          const o = response.outputState;
          view.ui.span("state-output-date").textContent = o.outputDate;
          view.ui.span("state-output-reason").textContent = o.outputReason ?? "—";
          view.ui.span("state-finished-product").textContent = o.finishedProduct ?? "—";
          view.ui.div("state-output").style.display = "";
        }
        companyId = response.companyId;
        if (!isEmpty(response.reporter)) {
          reporterMenu.selectOption(response.reporter);
        }
        if (!isEmpty(response.parentWorkUnit)) {
          parentMenu.selectOption(response.parentWorkUnit);
        }
        if (!isEmpty(response.assignees)) {
          assigneesMenu.setTokens(response.assignees);
        }

        const addChildMenu = view.ui.select("add-child").ui;
        addChildMenu.delegate = {
          didFocusSearchMenu: async function(initialize) {
            if (!initialize) {
              return null;
            }
            if (isEmpty(companyId)) {
              return [];
            }
            return os.network.get(`/lean/suggested-work-unit/${companyId}`);
          },
          didSearchForTerm: async function(term) {
            if (isEmpty(companyId)) {
              return [];
            }
            return os.network.get(`/lean/find-work-unit/${companyId}?q=${encodeURIComponent(term)}`);
          },
          didSelectOption: async function(option) {
            if (isEmpty(workUnitId)) {
              return;
            }
            try {
              await os.network.post("/lean/work-unit/child", { childWorkUnitId: parseInt(option.value) });
            } catch (error) {
              os.ui.showError(error.message);
              return;
            }
            loadChildren();
          }
        };

        loadChildren();

        const table = view.ui.table("logs");
        for (const log of response.logs) {
          const row = table.insertRow();
          row.insertCell().textContent = log.lineName;
          row.insertCell().textContent = log.state;
          row.insertCell().textContent = log.enterDate;
          row.insertCell().textContent = log.exitDate ?? "—";
          const operatorCell = row.insertCell();
          if (!isEmpty(log.operator)) {
            const btn = document.createElement("button");
            btn.className = "primary";
            btn.textContent = log.operator.name;
            const operatorId = parseInt(log.operator.id);
            btn.onclick = function() { openOperator(operatorId); };
            operatorCell.appendChild(btn);
          } else {
            operatorCell.textContent = "—";
          }
        }

        const commentList = view.ui.div("comments");
        for (const comment of response.comments) {
          commentList.appendChild(renderComment(comment));
        }
      }
      this.viewDidLoad = viewDidLoad;

      function viewDidAppear() {
        view.ui.input("name").focus();
      }
      this.viewDidAppear = viewDidAppear;

      this.didHitEnter = save;
    }
  </script>
  <div class="top">
    <div class="close-button"></div>
    <div class="title"><span>Work Unit</span></div>
    <div class="zoom-button"></div>
  </div>
  <div class="container vbox gap-20">
    <div class="vbox gap-10">
      <div class="hbox separated align-center">
        <div class="read-only">
          <label>Key</label>
          <span name="key">—</span>
        </div>
        <div name="on-hold" class="hbox gap-5"></div>
      </div>
      <div class="field">
        <label for="name">Name</label>
        <input type="text" name="name" placeholder="Name">
      </div>
      <div class="read-only">
        <label>ETA</label>
        <span name="eta">—</span>
      </div>
      <div class="read-only">
        <label>Creator</label>
        <span name="creator">—</span>
      </div>
      <div class="ui-search-menu">
        <label for="reporter">Reporter</label>
        <select name="reporter">
          <option>Assign reporter…</option>
        </select>
      </div>
      <div class="ui-token-menu" style="width: auto;">
        <label for="assignees">Assignees</label>
        <select name="assignees"></select>
      </div>
      <div class="ui-search-menu">
        <label for="parent">Parent</label>
        <select name="parent">
          <option>Assign parent…</option>
        </select>
      </div>
    </div>
    <fieldset class="vbox gap-10" name="status" style="display: none;">
      <legend>Status</legend>
      <div class="read-only" style="display: none;">
        <label>Queue</label>
        <span name="state-intake-queue">—</span>
      </div>
      <div name="state-station" style="display: none;" class="vbox gap-10">
        <div class="read-only">
          <label>Station</label>
          <span name="state-station-name">—</span>
        </div>
        <div class="read-only">
          <label>Operation</label>
          <span name="state-operation-name">—</span>
        </div>
        <div class="read-only">
          <label>Op. Status</label>
          <span name="state-operation-status">—</span>
        </div>
        <div class="controls">
          <button class="primary" onclick="$(this.controller).openStationWorkspace();">Open</button>
        </div>
      </div>
      <div name="state-output" style="display: none;" class="vbox gap-10">
        <div class="read-only">
          <label class="wider">Output Date</label>
          <span name="state-output-date">—</span>
        </div>
        <div class="read-only">
          <label>Reason</label>
          <span name="state-output-reason">—</span>
        </div>
        <div class="read-only">
          <label>Product</label>
          <span name="state-finished-product">—</span>
        </div>
      </div>
    </fieldset>
    <details class="ui-accordion" name="children" closed>
      <summary>Children</summary>
      <div class="vbox gap-10">
        <div class="ui-search-menu">
          <label for="add-child">Add</label>
          <select name="add-child">
            <option>Add work unit…</option>
          </select>
        </div>
        <table name="children">
          <tr>
            <th>Name</th>
            <th>ETA</th>
            <th></th>
          </tr>
        </table>
      </div>
    </details>
    <details class="ui-accordion" open>
      <summary>Comments</summary>
      <div class="vbox gap-10">
        <textarea name="new-comment" rows="2" placeholder="Add a comment…"></textarea>
        <div class="controls">
          <button class="default" onclick="$(this.controller).addComment();">Add comment</button>
        </div>
        <div name="comments" class="vbox gap-10"></div>
      </div>
    </details>
    <details class="ui-accordion" closed>
      <summary>History</summary>
      <table name="logs">
        <tr>
          <th>Line</th>
          <th>State</th>
          <th>Entered</th>
          <th>Exited</th>
          <th>Operator</th>
        </tr>
      </table>
    </details>
    <div class="controls">
      <button class="primary" onclick="$(this.controller).cancel();">Cancel</button>
      <button class="primary" onclick="$(this.controller).delete();">Delete</button>
      <button class="default" onclick="$(this.controller).save();">Save</button>
    </div>
  </div>
</div>
