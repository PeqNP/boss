<div class="ui-window">
  <script type="text/javascript">
    function $(this.id)(view) {
      let intakeQueueId = null;
      let workUnitId = null;
      let companyId = null;

      async function save() {
        const name = view.ui.inputValue("name", "Please provide a name.");
        if (isEmpty(name)) { return; }
        const etaRaw = view.ui.input("eta").value.trim();
        try {
          await os.network.put(`/lean/work-unit/${workUnitId}`, {
            name,
            eta: isEmpty(etaRaw) ? null : etaRaw
          });
        }
        catch (error) {
          os.ui.showError(error.message);
          return;
        }
        view.ui.close();
      }
      this.save = save;

      function _delete() {
        if (isEmpty(workUnitId)) { return; }
        os.ui.showDelete("Are you sure you want to delete this work unit?", null, async function() {
          try {
            await os.network.delete(`/lean/work-unit/${workUnitId}`);
          }
          catch {
            os.ui.showError("Failed to delete work unit. Please try again later.");
            return;
          }
          view.ui.close();
        });
      }
      this.delete = _delete;

      function cancel() {
        view.ui.close();
      }
      this.cancel = cancel;

      /**
       * @param {int} _intakeQueueId
       * @param {int?} _workUnitId
       */
      function configure(_intakeQueueId, _workUnitId) {
        intakeQueueId = _intakeQueueId;
        workUnitId = _workUnitId ?? null;
      }
      this.configure = configure;

      async function viewDidLoad() {
        const reporterMenu = view.ui.select("reporter").ui;
        reporterMenu.delegate = {
          didFocusSearchMenu: async function(initialize) {
            if (!initialize) { return null; }
            if (isEmpty(companyId)) { return []; }
            return os.network.get(`/lean/operator/suggested/${companyId}`);
          },
          didSearchForTerm: async function(term) {
            if (isEmpty(companyId)) { return []; }
            return os.network.get(`/lean/operator/${companyId}?q=${encodeURIComponent(term)}`);
          },
          didSelectOption: async function(option) {
            if (isEmpty(workUnitId)) { return; }
            try {
              await os.network.put(`/lean/work-unit/reporter/${workUnitId}`, { operatorId: parseInt(option.value) });
            } catch (error) {
              os.ui.showError(error.message);
            }
          },
          didDeselectOption: async function() {
            if (isEmpty(workUnitId)) { return; }
            try {
              await os.network.put(`/lean/work-unit/reporter/${workUnitId}`, { operatorId: null });
            } catch (error) {
              os.ui.showError(error.message);
            }
          }
        };

        const assigneesMenu = view.ui.select("assignees").ui;
        assigneesMenu.delegate = {
          didFocusTokenMenu: async function() {
            if (isEmpty(companyId)) { return []; }
            return os.network.get(`/lean/operators/suggested/${companyId}`);
          },
          didSearchForTerm: async function(term) {
            if (isEmpty(companyId)) { return []; }
            return os.network.get(`/lean/operators/${companyId}?q=${encodeURIComponent(term)}`);
          },
          didAddToken: async function(option) {
            if (isEmpty(workUnitId)) { return; }
            const ids = Array.from(view.ui.select("assignees").selectedOptions).map(o => parseInt(o.value));
            try {
              await os.network.put(`/lean/work-unit/assignees/${workUnitId}`, { operatorIds: ids });
            } catch (error) {
              os.ui.showError(error.message);
            }
          },
          didRemoveToken: async function(option) {
            if (isEmpty(workUnitId)) { return; }
            const ids = Array.from(view.ui.select("assignees").selectedOptions).map(o => parseInt(o.value));
            try {
              await os.network.put(`/lean/work-unit/assignees/${workUnitId}`, { operatorIds: ids });
            } catch (error) {
              os.ui.showError(error.message);
            }
          }
        };

        if (isEmpty(workUnitId)) { return; }
        let response;
        try {
          response = await os.network.get(`/lean/work-unit/${workUnitId}`);
        }
        catch (error) {
          os.ui.showError(error.message);
          return;
        }
        view.ui.span("key").textContent = response.key;
        view.ui.input("name").value = response.name;
        view.ui.input("eta").value = response.eta ?? "";
        view.ui.span("creator").textContent = response.creator?.name ?? "—";
        companyId = response.companyId;
        if (!isEmpty(response.reporter)) {
          reporterMenu.selectOption(response.reporter);
        }
        if (!isEmpty(response.assignees)) {
          assigneesMenu.setTokens(response.assignees);
        }
      }
      this.viewDidLoad = viewDidLoad;

      function viewDidAppear() {
        view.ui.input("name").focus();
      }
      this.viewDidAppear = viewDidAppear;

      this.didHitEnter = save;
    }
  </script>
  <div class="ui-menus">
    <div class="ui-menu" style="width: 140px;">
      <select name="file-menu">
        <option>File</option>
        <option onclick="$(this.controller).save();">Save</option>
        <option onclick="$(this.controller).delete();">Delete</option>
        <option onclick="$(this.controller).cancel();">Cancel</option>
      </select>
    </div>
  </div>
  <div class="top">
    <div class="close-button"></div>
    <div class="title"><span>Work Unit</span></div>
    <div class="zoom-button"></div>
  </div>
  <div class="container vbox gap-10" style="width: 420px">
    <div class="read-only">
      <label>Key</label>
      <span name="key">—</span>
    </div>
    <div class="field">
      <label for="name">Name</label>
      <input type="text" name="name" placeholder="Name">
    </div>
    <div class="field">
      <label for="eta">ETA</label>
      <input type="text" name="eta" placeholder="Optional">
    </div>
    <div class="read-only">
      <label>Creator</label>
      <span name="creator">—</span>
    </div>
    <div class="ui-search-menu" style="width: 200px;">
      <select name="reporter">
        <option>Assign reporter…</option>
      </select>
    </div>
    <div class="ui-token-menu" style="width: auto;">
      <label for="assignees">Assignees</label>
      <select name="assignees"></select>
    </div>
    <div class="controls">
      <button class="primary" onclick="$(this.controller).cancel();">Cancel</button>
      <button class="primary" onclick="$(this.controller).delete();">Delete</button>
      <button class="default" onclick="$(this.controller).save();">Save</button>
    </div>
  </div>
</div>
