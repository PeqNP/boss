<div class="ui-application">
  <script type="text/javascript">
    function $(this.id)(config) {
      function close() {
        os.closeApplication('$(app.bundleId)');
      }
      this.close = close;

      async function showAbout() {
        let win = await $(this.controller).loadController("About");
        win.ui.show();
      }
      this.showAbout = showAbout;

      async function showExample() {
        let win = await $(this.controller).loadController("Example");
        // Demonstrates how to configure a controller
        win.ui.show(function (ctrl) {
          ctrl.configure("Hello from Application");
        });
      }
      this.showExample = showExample;

      async function showFullscreen() {
        let win = await $(this.controller).loadController("Fullscreen");
        win.ui.show();
      }
      this.showFullscreen = showFullscreen;

      async function showKiosk() {
        let win = await $(this.controller).loadController("Kiosk");
        win.ui.show();
      }
      this.showKiosk = showKiosk;

      async function showTabular() {
        let win = await $(this.controller).loadController("Tabular");
        win.ui.show();
      }
      this.showTabular = showTabular;

      async function applicationDidStart() {
        await showExample();
      }
      this.applicationDidStart = applicationDidStart;
    }
  </script>
  <div class="ui-menus">
    <div class="ui-menu" style="width: 180px">
      <select name="application-menu">
        <option>Tutorial</option>
        <option onclick="$(this.controller).showAbout();">About Tutorial</option>
        <option class="group"></option>
        <option onclick="$(this.controller).showExample();">Show UI components</option>
        <option onclick="$(this.controller).showFullscreen();">Show fullscreen</option>
        <option onclick="$(this.controller).showTabular();">Show tabular data</option>
        <option onclick="$(this.controller).showKiosk();">Show kiosk</option>
        <option class="group"></option>
        <option onclick="os.ui.showControllers($(this.controller));">Show controllers</option>
        <option onclick="os.ui.showEmbeddedControllers($(this.controller));">Embedded controllers</option>
        <option class="group"></option>
        <option onclick="$(this.controller).close();">Close Tutorial</option>
      </select>
    </div>
  </div>
  <template id="ExampleController">
    <div class="ui-controller vbox gap-10" name="theme">
      <script type="text/javascript">
        function %(theme)(view) {
          function selectFill() {
            os.ui.showColorPicker(function (color) {
              view.ui.div("example-color").style.backgroundColor = color;
            });
          }
          this.selectFill = selectFill;

          function selectStroke() {
            os.ui.showColorPicker(function (color) {
              view.ui.div("example-color").style.borderColor = color;
            });
          }
          this.selectStroke = selectStroke;

          function viewDidLoad() {
            view.ui.div("example-color").style.backgroundColor = "#fff";
            view.ui.div("example-color").style.borderColor = "#000";
          }
          this.viewDidLoad = viewDidLoad;
        }
      </script>
      <fieldset>
        <legend>Color theme</legend>
        <div class="hbox gap-10">
          <div class="vbox gap-10" style="flex: 0 0 100px">
            <button class="primary" onclick="%(theme).selectFill();">Select fill</button>
            <button class="primary" onclick="%(theme).selectStroke();">Select stroke</button>
          </div>
          <div class="hbox align-center" style="flex: 1">
            <div name="example-color" style="border: 1px solid #000; border-radius: 5px; padding: 10px;">Example</div>
          </div>
        </div>
      </fieldset>
    </div>
  </template>
</div>
