<div class="ui-window">
  <script type="text/javascript">
    function $(this.id)(view) {
      function cancel() {
        view.ui.close();
      }
      this.cancel = cancel;
    }
  </script>
  <div class="top">
    <div class="close-button"></div>
    <div class="title"><span>Tabular</span></div>
    <div class="zoom-button"></div>
  </div>
  <div class="container vbox gap-10" style="width: 480px;">
    <p>Table with boundary (double) separator line.</p>
    <table>
      <tr class="boundary">
        <th>Header</th>
        <th>Header</th>
      </tr>
      <tr class="first-row">
        <td>Value</td>
        <td>Value</td>
      </tr>
    </table>

    <p>Table with single (default) separator line.</p>
    <table>
      <tr>
        <th>Header</th>
        <th>Header</th>
      </tr>
      <tr class="first-row">
        <td>Value</td>
        <td>Value</td>
      </tr>
    </table>
    <div class="controls">
      <button class="default" onclick="$(this.controller).cancel();">Close</button>
    </div>
  </div>
</div>
