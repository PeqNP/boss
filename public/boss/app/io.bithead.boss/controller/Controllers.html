<div class="ui-window">
  <script type="text/javascript">
    function $(this.id)(view) {
      const DEFAULT_CONFIG = `function (ctrl) {
    ctrl.configure();
}`;

      let app;
      let editor;

      /**
       * Configure with the UIApplication instance to inspect.
       *
       * @param {UIApplication} _app - The application whose controllers to inspect
       */
      function configure(_app) {
        app = _app;
      }
      this.configure = configure;

      async function open() {
        let name = view.ui.select("controllers").ui.selectedValue();
        if (isEmpty(name)) { return; }
        let win;
        try {
          win = await app.loadController(name);
        }
        catch (error) {
          os.ui.showError(error.message);
          return;
        }
        let fn;
        try {
          fn = eval(`(${editor.getValue("\n")})`);
        }
        catch (e) {
          os.ui.showError(`Invalid configuration function: ${e.message}`);
          return;
        }
        win.ui.show(fn);
      }
      this.open = open;

      function viewDidLoad() {
        view.ui.select("controllers").ui.delegate = {
          didSelectListBoxOption: function(opt) {
            view.ui.button("open").disabled = false;
          },
          didRemoveAllOptions: function() {
            view.ui.button("open").disabled = true;
          }
        };

        let names = app.getControllerNames();
        names.sort();
        view.ui.span("num-controllers").textContent = names.length;

        let options = names.map(function(name) { return { id: name, name: name }; });
        view.ui.select("controllers").ui.addNewOptions(options);

        Promise.all([
          os.network.stylesheet('/codemirror/lib/codemirror.css'),
          os.network.javascript('/codemirror/lib/codemirror.js'),
        ])
          .then(() => {
            return Promise.all([
              os.network.stylesheet('/codemirror/theme/monokai.css'),
              os.network.javascript('/codemirror/mode/javascript/javascript.js'),
            ])
          })
          .then(() => {
            let ta = view.ui.textarea("editor");
            editor = CodeMirror.fromTextArea(ta, {
              readOnly: false,
              mode: "javascript",
              tabSize: 4,
              indentWithTabs: false,
              electricChars: true,
              lineWrapping: false,
              lineNumbers: true,
              matchBrackets: true
            });
            editor.setSize(null, "100%");
            editor.setValue(DEFAULT_CONFIG);
          });
      }
      this.viewDidLoad = viewDidLoad;
    }
  </script>
  <div class="top">
    <div class="close-button"></div>
    <div class="title"><span>Controllers</span></div>
    <div class="zoom-button"></div>
  </div>
  <div class="metadata"><span name="num-controllers">0</span> controllers</div>
  <div class="container vbox gap-10" style="width: 500px;">
    <div class="vbox">
      <h3>Controller configuration</h3>
      <div style="flex-grow: 1; height: 100px; border: 1px solid #000">
        <textarea name="editor"></textarea>
      </div>
    </div>
    <div class="hbox gap-10">
      <div class="ui-list-box" style="width: 300px; height: 220px;">
        <select name="controllers"></select>
      </div>
      <div class="controls-right">
        <button name="open" class="default" disabled onclick="$(this.controller).open();">Open</button>
      </div>
    </div>
  </div>
</div>
