<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manufacturing Plant Flow Visualizer</title>
    <style>
        html, body { height: 100%; margin: 0; }
        #canvas {
            position: relative;
            width: 100%;
            height: 100vh;
            border: 1px solid black;
            overflow: auto;
            background: #f8f8f8;
            transform-origin: top left;
        }
        :root { --line-height: 64px; }

        #viewport {
            position: relative;
            transform-origin: top left;
            min-width: 100%;
            min-height: 100%;
            cursor: grab;
        }
        .grabbing { cursor: grabbing !important; }
        #controls {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 10;
        }
        #controls button {
            margin-left: 5px;
        }
        #controls button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .line {
            position: absolute;
            display: flex;
            flex-direction: row;
            height: var(--line-height);
            border-radius: 4px;
            box-shadow: none;
            min-width: 640px;
            gap: 20px;
            align-items: flex-start;
        }
        .line:has(.intake-group) {
            height: auto;
            align-items: center;
        }
        .inventory {
            position: absolute;
            width: 224px;
            min-height: 192px;
            border: 1px solid #475569;
            border-radius: 12px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: white;
            padding: 12px;
            user-select: none;
        }
        .inventory-name {
            font-size: 15px;
            font-weight: 700;
            color: #0f172a;
            text-align: left;
        }
        .inventory-grid {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px 12px;
            align-items: center;
            font-size: 11px;
        }
        .inventory-label {
            color: #475569;
            text-align: left;
        }
        .inventory-value {
            color: #0f172a;
            font-weight: 600;
            text-align: right;
        }
        .inventory-health-bubble {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 3px 10px;
            border-radius: 999px;
            border: 1px solid var(--inventory-health-border, #166534);
            background: var(--inventory-health-fill, #dcfce7);
            color: #111827;
            font-size: 11px;
            font-weight: 700;
            line-height: 1.2;
        }
        .component {
            width: 128px;
            height: var(--line-height);
            border: 1px solid black;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            font-size: 12px;
            text-align: center;
            user-select: none;
            position: relative;
            flex-shrink: 0;
            padding: 4px;
            gap: 4px;
        }
        .assembly { display: flex; flex-direction: row; }
        .intake-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            border: 1px solid #999;
            background: white;
            padding: 8px;
            border-radius: 4px;
        }
        .intake-group-label {
            font-size: 11px;
            font-weight: bold;
            color: #666;
            text-align: center;
            margin-bottom: 4px;
        }
        .mix-ratio-label {
            font-size: 9px;
            color: #999;
            text-align: center;
            margin-bottom: 2px;
            font-style: italic;
        }
        .intake-button {
            padding: 4px 8px;
            font-size: 10px;
            background-color: #f0f0f0;
            border: 1px solid #999;
            border-radius: 3px;
            cursor: pointer;
        }
        .intake-button:hover {
            background-color: #e0e0e0;
        }
        .intake-name-button {
            width: 100%;
            padding: 4px 8px;
            font-size: 10px;
            color: black;
            background: white;
            border: 1px solid #999;
            border-radius: 10px;
            cursor: pointer;
        }
        .intake-name-button:hover {
            background: #f5f5f5;
        }
        .hopper-work-unit-button {
            width: 100%;
            padding: 4px 8px;
            font-size: 10px;
            color: black;
            background: var(--hopper-work-unit-fill, white);
            border: 1px solid var(--hopper-work-unit-border, #999);
            border-radius: 10px;
            cursor: pointer;
        }
        .hopper-work-unit-button:hover {
            filter: brightness(0.98);
        }
        .output-button {
            width: 100%;
            min-height: 28px;
            padding: 4px 8px;
            font-size: 11px;
            color: black;
            background: white;
            border: 1px solid #999;
            border-radius: 10px;
            cursor: pointer;
        }
        .output-button:hover {
            background: #f5f5f5;
        }
        .station-component {
            justify-content: flex-start;
            align-items: stretch;
            gap: 6px;
            padding: 8px;
            background: var(--station-fill-color, white);
            border-color: var(--station-border-color, black);
            overflow: visible;
        }
        .station-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 6px;
        }
        .station-title {
            flex: 1;
            min-height: 28px;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            line-height: 1.15;
        }
        .station-edit-button {
            min-height: 22px;
            padding: 2px 8px;
            font-size: 10px;
            color: black;
            background: white;
            border: 1px solid var(--station-border-color, black);
            border-radius: 10px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .station-edit-button:hover {
            background: #f5f5f5;
        }
        .station-work-unit-toggle {
            width: 100%;
            min-height: 24px;
            padding: 4px 8px;
            font-size: 11px;
            color: black;
            background: white;
            border: 1px solid var(--station-border-color, black);
            border-radius: 10px;
            cursor: pointer;
        }
        .station-work-unit-toggle:hover {
            background: #f5f5f5;
        }
        .station-component.expanded {
            z-index: 5;
        }
        .station-component.expanded .station-work-unit-toggle {
            visibility: hidden;
        }
        .station-work-unit-panel {
            position: absolute;
            left: 8px;
            right: 8px;
            top: 42px;
            display: none;
            background: var(--station-fill-color, white);
            border: 1px solid var(--station-border-color, black);
            border-radius: 10px;
            box-sizing: border-box;
            padding: 8px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12);
        }
        .station-component.expanded .station-work-unit-panel {
            display: block;
        }
        .station-work-unit-collapse {
            width: 100%;
            min-height: 24px;
            margin-bottom: 8px;
            padding: 4px 8px;
            font-size: 11px;
            color: black;
            background: white;
            border: 1px solid var(--station-border-color, black);
            border-radius: 10px;
            cursor: pointer;
        }
        .station-work-unit-collapse:hover {
            background: #f5f5f5;
        }
        .station-work-unit-list {
            margin: 0;
            padding: 0;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
            text-align: left;
        }
        .station-work-unit-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 8px;
            border: 1px solid var(--work-unit-border, rgba(0, 0, 0, 0.15));
            border-radius: 8px;
            background: var(--work-unit-fill, rgba(255, 255, 255, 0.82));
            cursor: pointer;
        }
        .work-unit-card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .work-unit-title {
            flex: 1;
            min-width: 0;
            font-size: 10px;
            font-weight: 600;
            line-height: 1.2;
            text-align: left;
            word-break: break-word;
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            min-height: 24px;
        }
        .work-unit-hold {
            flex-shrink: 0;
            align-self: flex-start;
            padding: 2px 8px;
            border-radius: 999px;
            border: 1px solid #991b1b;
            background: #fee2e2;
            color: #991b1b;
            font-size: 9px;
            font-weight: 700;
            line-height: 1.4;
            text-transform: uppercase;
        }
        .work-unit-card-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .work-unit-assignees {
            display: flex;
            align-items: center;
            padding-left: 10px;
            min-height: 26px;
        }
        .work-unit-assignee {
            width: 24px;
            height: 24px;
            margin-left: -10px;
            border-radius: 50%;
            border: 1px solid rgba(0, 0, 0, 0.25);
            background: #111827;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-size: 9px;
            font-weight: 700;
            box-sizing: border-box;
        }
        .work-unit-assignee img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .work-unit-elapsed {
            flex-shrink: 0;
            font-size: 9px;
            font-variant-numeric: tabular-nums;
            color: #374151;
            white-space: nowrap;
        }
        .station-work-unit-empty {
            font-size: 10px;
            color: #444;
            text-align: center;
            padding: 6px 8px;
        }
        .line-header {
            position: absolute;
            top: -28px;
            left: 0;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            z-index: 2;
        }
        .title {
            font-size: 14px;
            color: navy;
        }
        .line-lock-button,
        .line-edit-button {
            min-height: 22px;
            padding: 2px 8px;
            font-size: 11px;
            color: black;
            background: white;
            border: 1px solid #999;
            border-radius: 10px;
            cursor: pointer;
        }
        .line-lock-button:hover,
        .line-edit-button:hover {
            background: #f5f5f5;
        }
        .line-locked .title {
            color: #475569;
        }
        #svg-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }
        .flow-line {
            fill: none;
            stroke-width: 3;
            stroke-dasharray: 6 4;
            animation: dash 1.5s linear infinite;
        }
        .flow-line.output { stroke: #0066cc; }
        .flow-line.input  { stroke: #228B22; }
        @keyframes dash { to { stroke-dashoffset: -10; } }
    </style>
</head>
<body>
    <div id="canvas">
        <div id="controls">
            <button id="addLine">Add line</button>
            <button id="zoomOut">Zoom Out</button>
            <button id="zoomIn">Zoom In</button>
        </div>
        <div id="viewport">
            <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
    </div>

    <script src="https://pixijs.download/v7.4.0/pixi.min.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const viewport = document.getElementById('viewport');
        const svg = document.getElementById('svg-overlay');
        const gridSize = 64;
        const connections = [];
        const allLines = {};
        const allInventories = {};
        const elapsedTimeElements = [];
        const inventoryHealthMap = {
            1: { name: 'Healthy', border: '#166534', fill: '#dcfce7' },
            2: { name: 'Reorder', border: '#a16207', fill: '#fef3c7' },
            3: { name: 'Low', border: '#991b1b', fill: '#fee2e2' }
        };

        // Initialize PixiJS
        const pixiApp = new PIXI.Application({
            width: canvas.clientWidth,
            height: canvas.clientHeight,
            backgroundColor: 0xf8f8f8,
            antialias: true
        });
        viewport.appendChild(pixiApp.view);
        pixiApp.view.style.position = 'absolute';
        pixiApp.view.style.top = '0';
        pixiApp.view.style.left = '0';
        pixiApp.view.style.pointerEvents = 'none'; // Let HTML handle interactions

        const gridGraphics = new PIXI.Graphics();
        const beltContainer = new PIXI.Container();
        pixiApp.stage.addChild(gridGraphics);
        pixiApp.stage.addChild(beltContainer);

        const CLEARANCE = 20;
        const STATION_CLEARANCE = CLEARANCE + 20; // clearance for stations is larger to provide room for the line's title
        const LEFT_INSET = 10;
        const RIGHT_INSET = 20;
        const BELT_W = 14; // belt thickness in px
        const CHEV_SPACE = 14; // distance between chevron centers along path
        const CHEV_HALF = 6; // half-width of chevron arms (controls pointiness)
        const CHEV_DEPTH = 2; // how far back the chevron notch goes
        const ANIM_SPEED = 40; // px per second along belt

        // PixiJS belts
        const pixiBelts = [];

        // ─── Component / Line setup ───────────────────────────────────────────────

        function createLine(lineDefinition) {
            const {
                id,
                gridX,
                gridY,
                name,
                locked = false,
                hasOutput = true,
                hopperWorkUnit = null,
                intakeQueues: rawIntakeQueues,
                stations: lineStations
            } = lineDefinition;
            const lineDiv = document.createElement('div');
            lineDiv.className = 'line';
            lineDiv.id = `line-${id}`;
            lineDiv.style.left = `${gridX * gridSize}px`;
            lineDiv.style.top  = `${gridY * gridSize}px`;
            lineDiv.dataset.locked = `${locked}`;
            if (locked) lineDiv.classList.add('line-locked');

            const header = document.createElement('div');
            header.className = 'line-header';

            const title = document.createElement('div');
            title.className = 'title';
            title.innerText = name;

            const editButton = document.createElement('button');
            editButton.className = 'line-edit-button';
            editButton.type = 'button';
            editButton.innerText = 'Edit';
            editButton.addEventListener('click', (e) => {
                e.stopPropagation();
                alert(name);
            });

            const lockButton = document.createElement('button');
            lockButton.className = 'line-lock-button';
            lockButton.type = 'button';

            function syncLockButton() {
                const isLocked = lineDiv.dataset.locked === 'true';
                lockButton.innerText = isLocked ? 'Unlock' : 'Lock';
            }

            lockButton.addEventListener('click', (e) => {
                e.stopPropagation();
                const isLocked = lineDiv.dataset.locked === 'true';
                const nextLocked = !isLocked;
                lineDiv.dataset.locked = `${nextLocked}`;
                lineDiv.classList.toggle('line-locked', nextLocked);
                syncLockButton();
            });

            syncLockButton();
            header.appendChild(title);
            header.appendChild(editButton);
            header.appendChild(lockButton);
            lineDiv.appendChild(header);

            // Support multiple intake queues grouped vertically
            // Convert simple strings/arrays to queue objects
            let intakeQueues = rawIntakeQueues;
            if (intakeQueues === undefined) intakeQueues = [{name: 'Intake Queue'}];
            if (typeof intakeQueues === 'string') intakeQueues = [{name: intakeQueues}];
            if (Array.isArray(intakeQueues) && intakeQueues.length > 0 && typeof intakeQueues[0] === 'string') {
                intakeQueues = intakeQueues.map(name => ({name}));
            }
            intakeQueues = intakeQueues.map((queue, index) => ({
                ...queue,
                id: Number.isInteger(queue.id) ? queue.id : index + 1,
                color: normalizeQueueColor(queue.color)
            }));
            const intakeQueueColors = intakeQueues.reduce((colorMap, queue) => {
                if (queue.color) colorMap[queue.id] = queue.color;
                return colorMap;
            }, {});

            // Create intake group container with label
            const intakeGroup = document.createElement('div');
            intakeGroup.className = 'intake-group';
            intakeGroup.id = `${lineDiv.id}-intake-group`;
            
            const intakeLabel = document.createElement('div');
            intakeLabel.className = 'intake-group-label';
            intakeLabel.innerText = 'Intake Queues';
            intakeGroup.appendChild(intakeLabel);
            
            const intakes = intakeQueues.map((queue, idx) => {
                const intake = createComponent(`${lineDiv.id}-intake${idx+1}`, '');
                // Apply color if specified
                if (queue.color) {
                    intake.style.backgroundColor = queue.color.fill;
                    intake.style.borderColor = queue.color.border;
                }
                const intakeNameButton = document.createElement('button');
                intakeNameButton.className = 'intake-name-button';
                intakeNameButton.type = 'button';
                intakeNameButton.innerText = queue.name;
                intakeNameButton.addEventListener('click', e => {
                    e.stopPropagation();
                    alert(`Intake Queue: ${queue.name}`);
                });
                intake.appendChild(intakeNameButton);
                // Add mix ratio label if multiple intakes
                if (intakeQueues.length > 1) {
                    const ratioLabel = document.createElement('div');
                    ratioLabel.className = 'mix-ratio-label';
                    const ratio = queue.mixRatio || 'balanced';
                    ratioLabel.innerText = typeof ratio === 'number' ? `${ratio}%` : ratio;
                    intake.appendChild(ratioLabel);
                }
                // Add Add button to the intake queue
                const addButton = document.createElement('button');
                addButton.className = 'intake-button';
                addButton.innerText = 'Add';
                addButton.addEventListener('click', e => {
                    e.stopPropagation();
                    alert(`Intake Queue: ${queue.name}`);
                });
                intake.appendChild(addButton);
                return intake;
            });
            intakes.forEach(intake => intakeGroup.appendChild(intake));

            // Create hopper container
            const hopper = createComponent(`${lineDiv.id}-hopper`, '');
            const hopperLabel = document.createElement('div');
            hopperLabel.className = 'intake-group-label';
            hopperLabel.innerText = 'Hopper';
            hopper.appendChild(hopperLabel);
            if (hopperWorkUnit) {
                hopper.appendChild(createHopperWorkUnitButton(hopperWorkUnit, intakeQueueColors, id));
            }
            const assembly = document.createElement('div');
            assembly.className = 'assembly';
            assembly.id = `${lineDiv.id}-assembly`;
            const normalizedStations = normalizeStations(lineStations, intakeQueueColors);
            const stations = [];
            normalizedStations.forEach((stationDefinition, index) => {
                const station = createStationComponent(`${lineDiv.id}-station${index + 1}`, stationDefinition, index + 1);
                assembly.appendChild(station);
                stations.push(station);
            });
            let output = null;
            if (hasOutput) {
                output = createComponent(`${lineDiv.id}-output`, '');
                const outputButton = document.createElement('button');
                outputButton.className = 'output-button';
                outputButton.type = 'button';
                outputButton.innerText = 'Output';
                outputButton.addEventListener('click', (e) => {
                    e.stopPropagation();
                    alert(`${id}: ${name}`);
                });
                output.appendChild(outputButton);
            }

            lineDiv.appendChild(intakeGroup);
            lineDiv.appendChild(hopper);
            lineDiv.appendChild(assembly);
            if (output) lineDiv.appendChild(output);

            allLines[id] = { div: lineDiv, intakes, hopper, stations, output, lockButton, definition: lineDefinition, intakeQueueColors };
            makeDraggable(lineDiv);

            /**
             * TODO: Add logic to show form when clicked.
             * 
            assembly.addEventListener('click', e => {
                e.stopPropagation();
                alert(`Assembly in ${name} clicked!`);
            });
             */

            viewport.appendChild(lineDiv);

            // Connect each intake to hopper
            intakes.forEach(intake => addConnection(intake, hopper, 'internal'));
            if (stations.length > 0) {
                addConnection(hopper, stations[0], 'internal');
                for (let i = 0; i < stations.length - 1; i++) addConnection(stations[i], stations[i+1], 'internal');
                if (output) addConnection(stations[stations.length - 1], output, 'internal');
            } else if (output) {
                addConnection(hopper, output, 'internal');
            }

            return allLines[id];
        }

        function createComponent(id, text) {
            const div = document.createElement('div');
            div.className = 'component';
            div.id = id;
            div.innerText = text;
            return div;
        }

        function createHopperWorkUnitButton(hopperWorkUnit, intakeQueueColors, lineId) {
            const hopperWorkUnitButton = document.createElement('button');
            hopperWorkUnitButton.className = 'hopper-work-unit-button';
            hopperWorkUnitButton.type = 'button';
            hopperWorkUnitButton.innerText = `${hopperWorkUnit.id}: ${hopperWorkUnit.name}`;
            const hopperWorkUnitColor = getIntakeQueueColor(hopperWorkUnit.intakeQueueId, intakeQueueColors);
            hopperWorkUnitButton.style.setProperty('--hopper-work-unit-border', hopperWorkUnitColor.border);
            hopperWorkUnitButton.style.setProperty('--hopper-work-unit-fill', hopperWorkUnitColor.fill);
            hopperWorkUnitButton.addEventListener('click', (e) => {
                e.stopPropagation();
                alert(hopperWorkUnit.name || '');
                moveHopperWorkUnitToFirstStation(lineId);
                addWorkUnitToHopper(lineId, getReplacementHopperWorkUnit(allLines[lineId].definition));
            });
            return hopperWorkUnitButton;
        }

        function addWorkUnitToHopper(lineId, workUnit) {
            const line = allLines[lineId];
            if (!line || !line.definition) return;

            const existingButton = line.hopper.querySelector('.hopper-work-unit-button');
            if (existingButton) existingButton.remove();

            line.definition.hopperWorkUnit = workUnit || null;
            if (!line.definition.hopperWorkUnit) return;

            line.hopper.appendChild(createHopperWorkUnitButton(line.definition.hopperWorkUnit, line.intakeQueueColors, lineId));
        }

        function getReplacementHopperWorkUnit(lineDefinition) {
            const featureQueue = Array.isArray(lineDefinition.intakeQueues)
                ? lineDefinition.intakeQueues.find((queue) => queue.name === 'Features')
                : null;

            return {
                id: 'SD-935',
                name: 'Add new feature',
                intakeQueueId: featureQueue ? featureQueue.id : null
            };
        }

        function moveHopperWorkUnitToFirstStation(lineId) {
            const line = allLines[lineId];
            if (!line || !line.definition || !line.definition.hopperWorkUnit) return;
            if (!Array.isArray(line.definition.stations) || line.definition.stations.length === 0) return;

            const workUnit = line.definition.hopperWorkUnit;
            const firstStationDefinition = line.definition.stations[0];
            if (!Array.isArray(firstStationDefinition.workUnits)) {
                firstStationDefinition.workUnits = [];
            }
            firstStationDefinition.workUnits.push({ ...workUnit });
            line.definition.hopperWorkUnit = null;

            const hopperButton = line.hopper.querySelector('.hopper-work-unit-button');
            if (hopperButton) hopperButton.remove();

            const firstStation = line.stations[0];
            if (!firstStation) return;

            const toggle = firstStation.querySelector('.station-work-unit-toggle');
            const panel = firstStation.querySelector('.station-work-unit-panel');
            const emptyState = panel.querySelector('.station-work-unit-empty');
            if (emptyState) emptyState.remove();

            let list = panel.querySelector('.station-work-unit-list');
            if (!list) {
                list = document.createElement('ul');
                list.className = 'station-work-unit-list';
                panel.appendChild(list);
            }

            const renderedWorkUnit = {
                ...workUnit,
                color: getIntakeQueueColor(workUnit.intakeQueueId, line.intakeQueueColors),
                assignees: Array.isArray(workUnit.assignees) ? workUnit.assignees : [],
                onHold: Boolean(workUnit.onHold),
                startTime: workUnit.startTime || null
            };
            list.appendChild(createWorkUnitCard(renderedWorkUnit));

            if (toggle) {
                toggle.innerText = `${firstStationDefinition.workUnits.length}`;
            }
        }

        function createInventory(inventoryDefinition) {
            const {
                id,
                gridX,
                gridY,
                name,
                cycleStock,
                bufferStockLevel,
                safetyStockLevel,
                reorderPoint,
                health
            } = inventoryDefinition;

            const inventoryDiv = document.createElement('div');
            inventoryDiv.className = 'inventory';
            inventoryDiv.id = `inventory-${id}`;
            inventoryDiv.style.left = `${gridX * gridSize}px`;
            inventoryDiv.style.top = `${gridY * gridSize}px`;

            const inventoryName = document.createElement('div');
            inventoryName.className = 'inventory-name';
            inventoryName.innerText = name;
            inventoryDiv.appendChild(inventoryName);

            const details = document.createElement('div');
            details.className = 'inventory-grid';

            const fields = [
                ['Cycle Stock', `${cycleStock}`],
                ['Buffer Stock Level', `${bufferStockLevel}`],
                ['Safety Stock Level', `${safetyStockLevel}`],
                ['Reorder point', `${reorderPoint}`]
            ];

            fields.forEach(([labelText, valueText]) => {
                const label = document.createElement('div');
                label.className = 'inventory-label';
                label.innerText = labelText;

                const value = document.createElement('div');
                value.className = 'inventory-value';
                value.innerText = valueText;

                details.appendChild(label);
                details.appendChild(value);
            });

            const healthLabel = document.createElement('div');
            healthLabel.className = 'inventory-label';
            healthLabel.innerText = 'Health';

            const healthValue = document.createElement('div');
            healthValue.className = 'inventory-value';
            const healthBubble = document.createElement('span');
            healthBubble.className = 'inventory-health-bubble';
            const healthMeta = getInventoryHealthMeta(health);
            healthBubble.style.setProperty('--inventory-health-border', healthMeta.border);
            healthBubble.style.setProperty('--inventory-health-fill', healthMeta.fill);
            healthBubble.innerText = healthMeta.name;
            healthValue.appendChild(healthBubble);

            details.appendChild(healthLabel);
            details.appendChild(healthValue);

            inventoryDiv.appendChild(details);

            viewport.appendChild(inventoryDiv);
            allInventories[id] = { div: inventoryDiv };
            makeDraggable(inventoryDiv);

            return allInventories[id];
        }

        function getInventoryHealthMeta(healthValue) {
            return inventoryHealthMap[healthValue] || { name: 'Unknown', border: '#475569', fill: '#e2e8f0' };
        }

        function normalizeQueueColor(color) {
            if (!color) return null;
            if (typeof color === 'object' && color.fill && color.border) return color;

            const fill = color;
            return {
                fill,
                border: darkenHexColor(fill, 0.28)
            };
        }

        function darkenHexColor(hexColor, amount) {
            const hex = (hexColor || '').replace('#', '');
            if (!/^[0-9a-fA-F]{6}$/.test(hex)) return '#999999';

            const rgb = [0, 2, 4].map((offset) => parseInt(hex.slice(offset, offset + 2), 16));
            const darkened = rgb.map((channel) => Math.max(0, Math.floor(channel * (1 - amount))));
            return `#${darkened.map((channel) => channel.toString(16).padStart(2, '0')).join('')}`;
        }

        function normalizeStations(stations, intakeQueueColors) {
            if (Array.isArray(stations) && stations.length > 0) {
                return stations.map((stationDefinition, index) => ({
                    name: stationDefinition.name || `Station ${index + 1}`,
                    workUnits: Array.isArray(stationDefinition.workUnits) ? stationDefinition.workUnits.map((workUnit) => ({
                        id: workUnit.id || '',
                        name: workUnit.name || '',
                        intakeQueueId: workUnit.intakeQueueId || null,
                        color: getIntakeQueueColor(workUnit.intakeQueueId, intakeQueueColors),
                        assignees: Array.isArray(workUnit.assignees) ? workUnit.assignees : [],
                        onHold: Boolean(workUnit.onHold),
                        startTime: workUnit.startTime || null
                    })) : [],
                    color: stationDefinition.color || null
                }));
            }

            return [{ name: 'Station 1', workUnits: [], color: null }];
        }

        function getIntakeQueueColor(intakeQueueId, intakeQueueColors) {
            return intakeQueueColors[intakeQueueId] || { border: '#999999', fill: '#ffffff' };
        }

        function createStationComponent(id, stationDefinition, stationNumber) {
            const station = document.createElement('div');
            station.className = 'component station-component';
            station.id = id;

            if (stationDefinition.color) {
                station.style.setProperty('--station-border-color', stationDefinition.color.border);
                station.style.setProperty('--station-fill-color', stationDefinition.color.fill);
            }

            const header = document.createElement('div');
            header.className = 'station-header';

            const stationName = stationDefinition.name || `Station ${stationNumber}`;

            const title = document.createElement('div');
            title.className = 'station-title';
            title.innerText = stationName;

            const editButton = document.createElement('button');
            editButton.className = 'station-edit-button';
            editButton.type = 'button';
            editButton.innerText = 'Edit';
            editButton.addEventListener('click', (e) => {
                e.stopPropagation();
                alert(stationName);
            });

            header.appendChild(title);
            header.appendChild(editButton);

            const toggle = document.createElement('button');
            toggle.className = 'station-work-unit-toggle';
            toggle.type = 'button';
            toggle.innerText = stationDefinition.workUnits.length > 0 ? `${stationDefinition.workUnits.length}` : 'Empty';

            const panel = document.createElement('div');
            panel.className = 'station-work-unit-panel';

            const collapseButton = document.createElement('button');
            collapseButton.className = 'station-work-unit-collapse';
            collapseButton.type = 'button';
            collapseButton.innerText = 'Collapse';
            collapseButton.addEventListener('click', (e) => {
                e.stopPropagation();
                station.classList.remove('expanded');
            });
            panel.appendChild(collapseButton);

            if (stationDefinition.workUnits.length > 0) {
                const list = document.createElement('ul');
                list.className = 'station-work-unit-list';
                stationDefinition.workUnits.forEach((workUnit) => {
                    const item = createWorkUnitCard(workUnit);
                    list.appendChild(item);
                });
                panel.appendChild(list);
            } else {
                const empty = document.createElement('div');
                empty.className = 'station-work-unit-empty';
                empty.innerText = 'No work units';
                panel.appendChild(empty);
            }

            toggle.addEventListener('click', (e) => {
                e.stopPropagation();
                station.classList.toggle('expanded');
            });

            panel.addEventListener('click', (e) => {
                e.stopPropagation();
            });

            station.appendChild(header);
            station.appendChild(toggle);
            station.appendChild(panel);

            return station;
        }

        function createWorkUnitCard(workUnit) {
            const item = document.createElement('li');
            item.className = 'station-work-unit-item';
            item.tabIndex = 0;
            if (workUnit.color) {
                item.style.setProperty('--work-unit-border', workUnit.color.border);
                item.style.setProperty('--work-unit-fill', workUnit.color.fill);
            }

            const top = document.createElement('div');
            top.className = 'work-unit-card-top';

            const title = document.createElement('div');
            title.className = 'work-unit-title';
            setWorkUnitTitle(title, `${workUnit.id}: ${workUnit.name}`);
            top.appendChild(title);

            const bottom = document.createElement('div');
            bottom.className = 'work-unit-card-bottom';

            const assignees = document.createElement('div');
            assignees.className = 'work-unit-assignees';
            workUnit.assignees.forEach((assignee, index) => {
                assignees.appendChild(createAssigneeElement(assignee, workUnit.assignees.length - index));
            });
            top.appendChild(assignees);

            const elapsed = document.createElement('div');
            elapsed.className = 'work-unit-elapsed';
            elapsed.dataset.startTime = workUnit.startTime || '';
            updateElapsedTimeElement(elapsed);
            elapsedTimeElements.push(elapsed);

            bottom.appendChild(elapsed);

            if (workUnit.onHold) {
                const hold = document.createElement('div');
                hold.className = 'work-unit-hold';
                hold.innerText = 'Hold';
                bottom.appendChild(hold);
            }

            item.appendChild(top);
            item.appendChild(bottom);

            item.addEventListener('click', (e) => {
                e.stopPropagation();
                alert(workUnit.name || '');
            });

            item.addEventListener('keydown', (e) => {
                if (e.key !== 'Enter' && e.key !== ' ') return;
                e.preventDefault();
                e.stopPropagation();
                alert(workUnit.name || '');
            });

            return item;
        }

        function createAssigneeElement(assignee, zIndex) {
            const wrapper = document.createElement('div');
            wrapper.className = 'work-unit-assignee';
            wrapper.title = assignee.name || assignee.id || '';
            wrapper.style.zIndex = `${zIndex}`;

            if (assignee.avatar) {
                const image = document.createElement('img');
                image.src = assignee.avatar;
                image.alt = assignee.name || assignee.id || 'Assignee avatar';
                image.addEventListener('error', () => {
                    wrapper.removeChild(image);
                    wrapper.innerText = getInitials(assignee.name);
                }, { once: true });
                wrapper.appendChild(image);
            } else {
                wrapper.innerText = getInitials(assignee.name);
            }

            return wrapper;
        }

        function getInitials(name) {
            const parts = (name || '').trim().split(/\s+/).filter(Boolean);
            if (parts.length === 0) return '?';
            if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
            return `${parts[0][0]}${parts[parts.length - 1][0]}`.toUpperCase();
        }

        function setWorkUnitTitle(element, text) {
            element.innerText = text;
            requestAnimationFrame(() => {
                if (element.scrollHeight <= element.clientHeight) return;

                let truncated = text;
                while (truncated.length > 1 && element.scrollHeight > element.clientHeight) {
                    truncated = truncated.slice(0, -1).trimEnd();
                    element.innerText = `${truncated}~`;
                }
            });
        }

        function updateElapsedTimeElement(element) {
            const startTime = element.dataset.startTime ? new Date(element.dataset.startTime) : null;
            if (!startTime || Number.isNaN(startTime.getTime())) {
                element.innerText = '1m';
                return;
            }

            const elapsedMs = Math.max(Date.now() - startTime.getTime(), 0);
            const elapsedMinutes = Math.max(1, Math.floor(elapsedMs / 60000));

            if (elapsedMinutes < 60) {
                element.innerText = `${elapsedMinutes}m`;
                return;
            }

            const days = Math.floor(elapsedMinutes / 1440);
            const hours = Math.floor((elapsedMinutes % 1440) / 60);
            const minutes = elapsedMinutes % 60;
            element.innerText = `${days}d ${hours}h ${minutes}m`;
        }

        function refreshElapsedTimes() {
            elapsedTimeElements.forEach((element) => updateElapsedTimeElement(element));
        }

        function makeDraggable(el) {
            let startX = 0, startY = 0, startLeft = 0, startTop = 0;
            el.addEventListener('pointerdown', (e) => {
                if (e.button !== 0) return;
                if (el.dataset.locked === 'true') return;
                if (e.target.closest('button, .station-work-unit-panel, .station-work-unit-item')) return;
                e.preventDefault();
                const s = getAppliedScale();
                startX = e.clientX;
                startY = e.clientY;
                startLeft = el.offsetLeft;
                startTop = el.offsetTop;
                el.setPointerCapture && el.setPointerCapture(e.pointerId);

                function onPointerMove(ev) {
                    ev.preventDefault();
                    const dx = (ev.clientX - startX) / s;
                    const dy = (ev.clientY - startY) / s;
                    el.style.left = (startLeft + dx) + 'px';
                    el.style.top  = (startTop  + dy) + 'px';
                    drawAllLines();
                }

                function onPointerUp(ev) {
                    el.releasePointerCapture && el.releasePointerCapture(ev.pointerId);
                    // Snap in layout coordinates; pointer movement has already been normalized for zoom.
                    const left = el.offsetLeft;
                    const top = el.offsetTop;
                    const snappedLeft = Math.round(left / gridSize) * gridSize;
                    const snappedTop = Math.round(top / gridSize) * gridSize;
                    el.style.left = snappedLeft + 'px';
                    el.style.top = snappedTop + 'px';
                    drawAllLines();
                    document.removeEventListener('pointermove', onPointerMove);
                    document.removeEventListener('pointerup', onPointerUp);
                }

                document.addEventListener('pointermove', onPointerMove);
                document.addEventListener('pointerup', onPointerUp);
            });
        }

        function addConnection(from, to, type = 'internal') {
            connections.push({ from, to, type });
        }

        // ─── Route point computation ──────────────────────────────────────────────

        function getInputPoints(fromStation, toLine) {
            const s     = getAppliedScale();
            const cRect = viewport.getBoundingClientRect();
            const stationR = fromStation.getBoundingClientRect();
            const lineR = toLine.getBoundingClientRect();
            const c = { left: cRect.left / s, top: cRect.top / s };
            const station = { left: stationR.left / s, top: stationR.top / s };
            const line = { left: lineR.left / s, top: lineR.top / s, height: lineR.height / s };
            return [
                { x: (station.left - c.left) + LEFT_INSET,  y: station.top - c.top },
                { x: (station.left - c.left) + LEFT_INSET,  y: station.top - c.top - STATION_CLEARANCE },
                { x: (line.left - c.left) - CLEARANCE,   y: station.top - c.top - STATION_CLEARANCE },
                { x: (line.left - c.left) - CLEARANCE,   y: (line.top - c.top) + line.height / 2 },
                { x:  line.left - c.left,                y: (line.top - c.top) + line.height / 2 },
            ];
        }

        function getOutputPoints(fromOutput, toStation) {
            const s     = getAppliedScale();
            const cRect = viewport.getBoundingClientRect();
            const fromR = fromOutput.getBoundingClientRect();
            const toR   = toStation.getBoundingClientRect();
            const c = { left: cRect.left / s, top: cRect.top / s };
            const f = { right: fromR.right / s, top: fromR.top / s, height: fromR.height / s };
            const t = { right: toR.right / s, top: toR.top / s };
            return [
                { x: f.right - c.left,                y: (f.top - c.top) + f.height / 2 },
                { x: f.right - c.left + CLEARANCE,    y: (f.top - c.top) + f.height / 2 },
                { x: f.right - c.left + CLEARANCE,    y: t.top - c.top - STATION_CLEARANCE },
                { x: (t.right  - c.left) - RIGHT_INSET, y: t.top - c.top - STATION_CLEARANCE },
                { x: (t.right  - c.left) - RIGHT_INSET, y: t.top - c.top },
            ];
        }

        // Return the numeric CSS scale applied to the viewport (1.0 when unscaled)
        function getAppliedScale() {
            const t = viewport.style.transform || '';
            const m = t.match(/scale\(([^)]+)\)/);
            return m ? parseFloat(m[1]) : 1;
        }

        // Read the grid size from CSS variable --line-height (fallback to JS gridSize)
        function getGridSize() {
            const root = getComputedStyle(document.documentElement).getPropertyValue('--line-height') || '';
            if (root && root.trim().endsWith('px')) {
                return parseFloat(root);
            }
            // fallback
            return gridSize;
        }

        function getPaddedElementBounds() {
            const elementBounds = getElementBounds();

            return {
                left: Math.max(0, elementBounds.left - gridSize),
                top: Math.max(0, elementBounds.top - gridSize),
                right: elementBounds.right + gridSize,
                bottom: elementBounds.bottom + gridSize,
            };
        }

        function syncViewportSize() {
            const scale = getAppliedScale();
            const minWidth = canvas.clientWidth / scale;
            const minHeight = canvas.clientHeight / scale;
            const paddedBounds = getPaddedElementBounds();

            const width = Math.ceil(Math.max(minWidth, paddedBounds.right));
            const height = Math.ceil(Math.max(minHeight, paddedBounds.bottom));

            viewport.style.width = width + 'px';
            viewport.style.height = height + 'px';
            svg.style.width = width + 'px';
            svg.style.height = height + 'px';
            pixiApp.renderer.resize(width, height);
        }

        function getElementBounds() {
            const entries = [...Object.values(allLines), ...Object.values(allInventories)];
            if (entries.length === 0) {
                return { left: 0, top: 0, right: 0, bottom: 0 };
            }

            let left = Infinity;
            let top = Infinity;
            let right = 0;
            let bottom = 0;

            entries.forEach(({ div }) => {
                const snappedLeft = Math.floor(div.offsetLeft / gridSize) * gridSize;
                const snappedTop = Math.floor(div.offsetTop / gridSize) * gridSize;
                const snappedRight = Math.ceil((div.offsetLeft + div.offsetWidth) / gridSize) * gridSize;
                const snappedBottom = Math.ceil((div.offsetTop + div.offsetHeight) / gridSize) * gridSize;

                left = Math.min(left, snappedLeft);
                top = Math.min(top, snappedTop);
                right = Math.max(right, snappedRight);
                bottom = Math.max(bottom, snappedBottom);
            });

            return {
                left: Math.max(0, left),
                top: Math.max(0, top),
                right,
                bottom,
            };
        }

        function getVisibleBounds() {
            const scale = getAppliedScale();
            const width = canvas.clientWidth / scale;
            const height = canvas.clientHeight / scale;

            return {
                left: canvas.scrollLeft,
                top: canvas.scrollTop,
                right: canvas.scrollLeft + width,
                bottom: canvas.scrollTop + height,
            };
        }

        function areAllElementsInView() {
            const elementBounds = getElementBounds();
            const visibleBounds = getVisibleBounds();

            return elementBounds.left >= visibleBounds.left &&
                elementBounds.top >= visibleBounds.top &&
                elementBounds.right <= visibleBounds.right &&
                elementBounds.bottom <= visibleBounds.bottom;
        }

        function clampViewportToElements() {
            const paddedBounds = getPaddedElementBounds();
            const scale = getAppliedScale();
            const visibleWidth = canvas.clientWidth / scale;
            const visibleHeight = canvas.clientHeight / scale;

            const minScrollLeft = paddedBounds.left;
            const maxScrollLeft = Math.max(minScrollLeft, paddedBounds.right - visibleWidth);
            const minScrollTop = paddedBounds.top;
            const maxScrollTop = Math.max(minScrollTop, paddedBounds.bottom - visibleHeight);

            canvas.scrollLeft = Math.min(maxScrollLeft, Math.max(minScrollLeft, canvas.scrollLeft));
            canvas.scrollTop = Math.min(maxScrollTop, Math.max(minScrollTop, canvas.scrollTop));
        }

        // ─── Path walking utilities ───────────────────────────────────────────────

        // Compute cumulative arc lengths at each point
        function segmentLengths(pts) {
            const lens = [0];
            for (let i = 1; i < pts.length; i++) {
                const dx = pts[i].x - pts[i-1].x;
                const dy = pts[i].y - pts[i-1].y;
                lens.push(lens[i-1] + Math.sqrt(dx*dx + dy*dy));
            }
            return lens;
        }

        // Given distance along the polyline, return {x, y, angle}
        function samplePath(pts, cumLens, t) {
            const total = cumLens[cumLens.length - 1];
            t = ((t % total) + total) % total; // wrap
            for (let i = 1; i < pts.length; i++) {
                if (t <= cumLens[i] || i === pts.length - 1) {
                    const seg = cumLens[i] - cumLens[i-1];
                    const frac = seg > 0 ? (t - cumLens[i-1]) / seg : 0;
                    const dx = pts[i].x - pts[i-1].x;
                    const dy = pts[i].y - pts[i-1].y;
                    return {
                        x: pts[i-1].x + dx * frac,
                        y: pts[i-1].y + dy * frac,
                        angle: Math.atan2(dy, dx)   // radians, pointing forward
                    };
                }
            }
        }

        // ─── Chevron geometry ─────────────────────────────────────────────────────
        //
        // A chevron at position (cx,cy) pointing in direction `angle`:
        //   forward tip: cx + cos(a)*CHEV_DEPTH,  cy + sin(a)*CHEV_DEPTH
        //   left  arm:   perpendicular -CHEV_HALF  offset, back CHEV_DEPTH
        //   right arm:   perpendicular +CHEV_HALF  offset, back CHEV_DEPTH
        //
        //      L ──── tip ──── R
        //       \            /
        //        (open back)
        //
        // We draw it as a two-segment open path: L→tip→R

        // ─── Conveyor belt state & animation loop ────────────────────────────────

        // Animation with PixiJS ticker
        pixiApp.ticker.add((delta) => {
            const dt = delta / 60; // normalize to ~60 FPS
            pixiBelts.forEach(belt => {
                belt.offset = (belt.offset + ANIM_SPEED * dt) % CHEV_SPACE;
                belt.chevrons.forEach((chevron, i) => {
                    const dist = belt.offset + i * CHEV_SPACE;
                    if (dist > belt.total) {
                        chevron.visible = false;
                        return;
                    }
                    chevron.visible = true;
                    const s = samplePath(belt.pts, belt.cumLens, dist);
                    chevron.position.set(s.x, s.y);
                    chevron.rotation = s.angle;
                });
            });
        });

        // ─── Draw grid ────────────────────────────────────────────────────

        function drawGrid() {
            gridGraphics.clear();
            const width = pixiApp.renderer.width;
            const height = pixiApp.renderer.height;
            gridGraphics.lineStyle(1, 0x000000, 0.06);
            for (let x = 0; x <= width; x += gridSize) {
                gridGraphics.moveTo(x, 0);
                gridGraphics.lineTo(x, height);
            }
            for (let y = 0; y <= height; y += gridSize) {
                gridGraphics.moveTo(0, y);
                gridGraphics.lineTo(width, y);
            }
        }

        // ─── Draw a conveyor belt (belt body + chevrons) ─────────────────

        function drawConveyorBelt(pts) {
            const cumLens  = segmentLengths(pts);
            const total    = cumLens[cumLens.length - 1];
            const count    = Math.ceil(total / CHEV_SPACE) + 2;

            // Belt body
            const beltGraphics = new PIXI.Graphics();
            beltGraphics.lineStyle(BELT_W + 2, 0x333333); // border
            beltGraphics.moveTo(pts[0].x, pts[0].y);
            for (let i = 1; i < pts.length; i++) {
                beltGraphics.lineTo(pts[i].x, pts[i].y);
            }
            beltGraphics.lineStyle(BELT_W, 0xd4d4d4); // body
            beltGraphics.moveTo(pts[0].x, pts[0].y);
            for (let i = 1; i < pts.length; i++) {
                beltGraphics.lineTo(pts[i].x, pts[i].y);
            }
            beltContainer.addChild(beltGraphics);

            // Chevrons
            const chevronContainer = new PIXI.Container();
            beltContainer.addChild(chevronContainer);

            const chevrons = [];
            for (let i = 0; i < count; i++) {
                const chevron = new PIXI.Graphics();
                chevron.lineStyle(3, 0x777777);
                chevron.moveTo(-CHEV_DEPTH, -CHEV_HALF);
                chevron.lineTo(CHEV_DEPTH, 0);
                chevron.lineTo(-CHEV_DEPTH, CHEV_HALF);
                chevronContainer.addChild(chevron);
                chevrons.push(chevron);
            }

            // Register belt for animation
            pixiBelts.push({ pts, cumLens, total, chevrons, offset: 0 });
        }

        // ─── Draw all connections ─────────────────────────────────────────────────

        function drawAllLines() {
            // Clear PixiJS belts and SVG
            pixiBelts.length = 0;
            beltContainer.removeChildren();
            svg.innerHTML = '';

            syncViewportSize();

            drawGrid();

            // Group internal connections by line
            const internalByLine = {};
            connections.forEach(conn => {
                if (conn.type === 'internal') {
                    const lineId = conn.from.id.split('-')[1];
                    if (!internalByLine[lineId]) internalByLine[lineId] = [];
                    internalByLine[lineId].push(conn);
                }
            });

            // Draw single conveyor belt for each line from intake group to output
            Object.keys(internalByLine).forEach(lineId => {
                const line = allLines[lineId];
                // Use the intake group container (holds all intakes) as the starting point
                const intakeGroupEl = line.div.querySelector('.intake-group') || 
                                       (line.intakes && line.intakes[0]) || 
                                       line.intake; // fallback to first intake or single intake
                const components = [intakeGroupEl, line.hopper, ...line.stations];
                if (line.output) components.push(line.output);
                const pts = [];
                const s = getAppliedScale();
                const crRect = viewport.getBoundingClientRect();
                const cr = { left: crRect.left / s, top: crRect.top / s };
                for (let i = 0; i < components.length - 1; i++) {
                    const from = components[i];
                    const to = components[i + 1];
                    const frR = from.getBoundingClientRect();
                    const trR = to.getBoundingClientRect();
                    const fr = { right: frR.right / s, top: frR.top / s, height: frR.height / s };
                    const tr = { left: trR.left / s, top: trR.top / s, height: trR.height / s };
                    const y = (fr.top + fr.height / 2 + tr.top + tr.height / 2) / 2 - cr.top;
                    pts.push({ x: fr.right - cr.left, y });
                    pts.push({ x: tr.left - cr.left, y });
                }
                if (pts.length > 0) drawConveyorBelt(pts);
            });

            // Draw other connections
            connections.forEach(conn => {
                if (conn.type === 'internal') return; // already handled

                let pts;
                if (conn.type === 'output') pts = getOutputPoints(conn.from, conn.to);
                if (conn.type === 'input')  pts = getInputPoints(conn.from, conn.to);

                if (conn.conveyor) {
                    drawConveyorBelt(pts);
                } else {
                    const el = document.createElementNS("http://www.w3.org/2000/svg","path");
                    el.setAttribute("d", pointsToD(pts));
                    el.classList.add("flow-line", conn.type);

        // Zoom controls: zoomLevel ranges from 1.0 (100%) to 3.0 (300%) in 0.25 steps.
        let zoomLevel = 1.0;
        const ZOOM_STEP = 0.25;
        const ZOOM_MIN = 1.0;
        const ZOOM_MAX = 3.0;

        const zoomInBtn = document.getElementById('zoomIn');
        const zoomOutBtn = document.getElementById('zoomOut');
        const addLineBtn = document.getElementById('addLine');

        addLineBtn.addEventListener('click', () => {
            alert('Add a line.');
        });

        function applyZoom() {
            // Store grid positions before zoom change
            const gridPositions = {};
            
            Object.keys(allLines).forEach(lineId => {
                const lineDiv = allLines[lineId].div;
                const gridX = Math.round(lineDiv.offsetLeft / gridSize);
                const gridY = Math.round(lineDiv.offsetTop / gridSize);
                gridPositions[lineId] = { gridX, gridY };
            });
            Object.keys(allInventories).forEach(inventoryId => {
                const inventoryDiv = allInventories[inventoryId].div;
                const gridX = Math.round(inventoryDiv.offsetLeft / gridSize);
                const gridY = Math.round(inventoryDiv.offsetTop / gridSize);
                gridPositions[`inventory-${inventoryId}`] = { gridX, gridY };
            });

            // visual scale = 1 / zoomLevel so larger zoomLevel shows more content (zoomed out)
            const visualScale = 1 / zoomLevel;
            viewport.style.transform = `scale(${visualScale})`;
            pixiApp.stage.scale.set(1);
            
            // Restore elements to their grid positions in layout coordinates.
            Object.keys(allLines).forEach(lineId => {
                const lineDiv = allLines[lineId].div;
                const { gridX, gridY } = gridPositions[lineId];
                lineDiv.style.left = (gridX * gridSize) + 'px';
                lineDiv.style.top = (gridY * gridSize) + 'px';
            });
            Object.keys(allInventories).forEach(inventoryId => {
                const inventoryDiv = allInventories[inventoryId].div;
                const { gridX, gridY } = gridPositions[`inventory-${inventoryId}`];
                inventoryDiv.style.left = (gridX * gridSize) + 'px';
                inventoryDiv.style.top = (gridY * gridSize) + 'px';
            });

            syncViewportSize();
            clampViewportToElements();
            
            updateZoomButtonStates();
            
            // Redraw belts to reconnect to element positions
            drawAllLines();
        }

        function updateZoomButtonStates() {
            zoomInBtn.disabled = zoomLevel <= ZOOM_MIN;
            zoomOutBtn.disabled = zoomLevel >= ZOOM_MAX;
        }

        zoomInBtn.addEventListener('click', () => {
            zoomLevel = Math.max(ZOOM_MIN, +(zoomLevel - ZOOM_STEP).toFixed(2));
            applyZoom();
        });
        zoomOutBtn.addEventListener('click', () => {
            zoomLevel = Math.min(ZOOM_MAX, +(zoomLevel + ZOOM_STEP).toFixed(2));
            applyZoom();
        });

        // Initialize zoom button states
        updateZoomButtonStates();
        refreshElapsedTimes();
        setInterval(refreshElapsedTimes, 60000);

        // handle window/container resize
        window.addEventListener('resize', () => {
            syncViewportSize();
            clampViewportToElements();
            drawAllLines();
        });

        // --- Panning (grab the background to scroll) --------------------
        let isPanning = false;
        let panStartX = 0, panStartY = 0, panStartScrollLeft = 0, panStartScrollTop = 0;

        viewport.addEventListener('pointerdown', (e) => {
            // only start pan when primary button and clicked directly on the viewport background
            if (e.button !== 0) return;
            if (e.target !== viewport) return;
            if (areAllElementsInView()) return;
            isPanning = true;
            panStartX = e.clientX;
            panStartY = e.clientY;
            panStartScrollLeft = canvas.scrollLeft;
            panStartScrollTop = canvas.scrollTop;
            viewport.classList.add('grabbing');
            try { viewport.setPointerCapture(e.pointerId); } catch (err) {}
            e.preventDefault();
        });

        document.addEventListener('pointermove', (e) => {
            if (!isPanning) return;
            const s = getAppliedScale();
            const dx = e.clientX - panStartX;
            const dy = e.clientY - panStartY;
            // move scroll inversely to mouse movement; account for CSS scale
            const scrollLeft = panStartScrollLeft - dx / s;
            const scrollTop = panStartScrollTop - dy / s;
            canvas.scrollLeft = scrollLeft;
            canvas.scrollTop = scrollTop;
            clampViewportToElements();
            e.preventDefault();
        });

        document.addEventListener('pointerup', (e) => {
            if (!isPanning) return;
            isPanning = false;
            try { viewport.releasePointerCapture(e.pointerId); } catch (err) {}
            viewport.classList.remove('grabbing');
        });

        // initial draw
        setTimeout(() => { applyZoom(); }, 100);
    </script>
