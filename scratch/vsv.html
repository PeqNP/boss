<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manufacturing Plant Flow Visualizer</title>
    <style>
        html, body { height: 100%; margin: 0; }
        #canvas {
            position: relative;
            width: 100%;
            height: 100vh;
            border: 1px solid black;
            overflow: auto;
            background: #f8f8f8;
            transform-origin: top left;
        }
        :root { --line-height: 64px; }

        #viewport {
            position: relative;
            transform-origin: top left;
            min-width: 100%;
            min-height: 100%;
            cursor: grab;
        }
        .grabbing { cursor: grabbing !important; }
        #controls {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
        }
        #controls button {
            margin-left: 5px;
        }
        #controls button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .line {
            position: absolute;
            display: flex;
            flex-direction: row;
            height: var(--line-height);
            border-radius: 4px;
            box-shadow: none;
            min-width: 640px;
            gap: 20px;
            align-items: flex-start;
        }
        .line:has(.intake-group) {
            height: auto;
            align-items: center;
        }
        .component {
            width: 128px;
            height: var(--line-height);
            border: 1px solid black;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            font-size: 12px;
            text-align: center;
            user-select: none;
            position: relative;
            flex-shrink: 0;
            padding: 4px;
            gap: 4px;
        }
        .assembly { display: flex; flex-direction: row; }
        .intake-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            border: 1px solid #999;
            background: white;
            padding: 8px;
            border-radius: 4px;
        }
        .intake-group-label {
            font-size: 11px;
            font-weight: bold;
            color: #666;
            text-align: center;
            margin-bottom: 4px;
        }
        .mix-ratio-label {
            font-size: 9px;
            color: #999;
            text-align: center;
            margin-bottom: 2px;
            font-style: italic;
        }
        .intake-button {
            padding: 4px 8px;
            font-size: 10px;
            background-color: #f0f0f0;
            border: 1px solid #999;
            border-radius: 3px;
            cursor: pointer;
        }
        .intake-button:hover {
            background-color: #e0e0e0;
        }
        .work-unit-button {
            padding: 4px 8px;
            font-size: 10px;
            background-color: #f0f0f0;
            border: 1px solid #999;
            border-radius: 3px;
            cursor: pointer;
        }
        .work-unit-button:hover {
            background-color: #e0e0e0;
        }
        .title {
            position: absolute;
            top: -20px; left: 0;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: navy;
        }
        #svg-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }
        .flow-line {
            fill: none;
            stroke-width: 3;
            stroke-dasharray: 6 4;
            animation: dash 1.5s linear infinite;
        }
        .flow-line.output { stroke: #0066cc; }
        .flow-line.input  { stroke: #228B22; }
        @keyframes dash { to { stroke-dashoffset: -10; } }
    </style>
</head>
<body>
    <div id="canvas">
        <div id="controls">
            <button id="zoomOut">Zoom Out</button>
            <button id="zoomIn">Zoom In</button>
        </div>
        <div id="viewport">
            <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
    </div>

    <script src="https://pixijs.download/v7.4.0/pixi.min.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const viewport = document.getElementById('viewport');
        const svg = document.getElementById('svg-overlay');
        const gridSize = 64;
        const connections = [];
        const allLines = {};

        // Initialize PixiJS
        const pixiApp = new PIXI.Application({
            width: window.innerWidth,
            height: window.innerHeight,
            backgroundColor: 0xf8f8f8,
            antialias: true
        });
        viewport.appendChild(pixiApp.view);
        pixiApp.view.style.position = 'absolute';
        pixiApp.view.style.top = '0';
        pixiApp.view.style.left = '0';
        pixiApp.view.style.pointerEvents = 'none'; // Let HTML handle interactions

        const gridGraphics = new PIXI.Graphics();
        const beltContainer = new PIXI.Container();
        pixiApp.stage.addChild(gridGraphics);
        pixiApp.stage.addChild(beltContainer);

        const CLEARANCE = 20;
        const STEP_CLEARANCE = CLEARANCE + 20; // clearance for steps is larger to provide room for the line's title
        const LEFT_INSET = 10;
        const RIGHT_INSET = 20;
        const BELT_W = 14; // belt thickness in px
        const CHEV_SPACE = 14; // distance between chevron centers along path
        const CHEV_HALF = 6; // half-width of chevron arms (controls pointiness)
        const CHEV_DEPTH = 2; // how far back the chevron notch goes
        const ANIM_SPEED = 40; // px per second along belt

        // PixiJS belts
        const pixiBelts = [];

        // ─── Component / Line setup ───────────────────────────────────────────────

        function createLine(id, gridX, gridY, stepCount, name, intakeQueues, workUnit) {
            const lineDiv = document.createElement('div');
            lineDiv.className = 'line';
            lineDiv.id = `line-${id}`;
            lineDiv.style.left = `${gridX * gridSize}px`;
            lineDiv.style.top  = `${gridY * gridSize}px`;

            const title = document.createElement('div');
            title.className = 'title';
            title.innerText = name;
            lineDiv.appendChild(title);

            // Support multiple intake queues grouped vertically
            // Convert simple strings/arrays to queue objects
            if (intakeQueues === undefined) intakeQueues = [{name: 'Intake Queue'}];
            if (typeof intakeQueues === 'string') intakeQueues = [{name: intakeQueues}];
            if (Array.isArray(intakeQueues) && intakeQueues.length > 0 && typeof intakeQueues[0] === 'string') {
                intakeQueues = intakeQueues.map(name => ({name}));
            }

            // Create intake group container with label
            const intakeGroup = document.createElement('div');
            intakeGroup.className = 'intake-group';
            intakeGroup.id = `${lineDiv.id}-intake-group`;
            
            const intakeLabel = document.createElement('div');
            intakeLabel.className = 'intake-group-label';
            intakeLabel.innerText = 'Intake Queues';
            intakeGroup.appendChild(intakeLabel);
            
            const intakes = intakeQueues.map((queue, idx) => {
                const intake = createComponent(`${lineDiv.id}-intake${idx+1}`, queue.name);
                // Apply color if specified
                if (queue.color) {
                    intake.style.backgroundColor = queue.color;
                }
                // Add mix ratio label if multiple intakes
                if (intakeQueues.length > 1) {
                    const ratioLabel = document.createElement('div');
                    ratioLabel.className = 'mix-ratio-label';
                    const ratio = queue.mixRatio || 'balanced';
                    ratioLabel.innerText = typeof ratio === 'number' ? `${ratio}%` : ratio;
                    intake.appendChild(ratioLabel);
                }
                // Add View button to the intake queue
                const viewButton = document.createElement('button');
                viewButton.className = 'intake-button';
                viewButton.innerText = 'View';
                viewButton.addEventListener('click', e => {
                    e.stopPropagation();
                    alert(`Intake Queue: ${queue.name}`);
                });
                intake.appendChild(viewButton);
                // Add Add button to the intake queue
                const addButton = document.createElement('button');
                addButton.className = 'intake-button';
                addButton.innerText = 'Add';
                addButton.addEventListener('click', e => {
                    e.stopPropagation();
                    alert(`Intake Queue: ${queue.name}`);
                });
                intake.appendChild(addButton);
                return intake;
            });
            intakes.forEach(intake => intakeGroup.appendChild(intake));

            // Create hopper container with work unit button
            const hopper = createComponent(`${lineDiv.id}-hopper`, '');
            const hopperLabel = document.createElement('div');
            hopperLabel.className = 'intake-group-label';
            hopperLabel.innerText = 'Hopper';
            hopper.appendChild(hopperLabel);
            const workUnitName = workUnit || 'No Work Unit';
            const workUnitButton = document.createElement('button');
            workUnitButton.className = 'work-unit-button';
            workUnitButton.innerText = workUnitName;
            // Apply color from first intake queue if available
            if (intakeQueues.length > 0 && intakeQueues[0].color) {
                workUnitButton.style.backgroundColor = intakeQueues[0].color;
            }
            workUnitButton.addEventListener('click', e => {
                e.stopPropagation();
                alert(`Work Unit: ${workUnitName}`);
            });
            hopper.appendChild(workUnitButton);
            const assembly = document.createElement('div');
            assembly.className = 'assembly';
            assembly.id = `${lineDiv.id}-assembly`;
            const steps = [];
            for (let i = 1; i <= stepCount; i++) {
                const step = createComponent(`${lineDiv.id}-step${i}`, `Step ${i}`);
                assembly.appendChild(step);
                steps.push(step);
            }
            const output = createComponent(`${lineDiv.id}-output`, 'Output');

            lineDiv.appendChild(intakeGroup);
            lineDiv.appendChild(hopper);
            lineDiv.appendChild(assembly);
            lineDiv.appendChild(output);

            allLines[id] = { div: lineDiv, intakes, hopper, steps, output };
            makeDraggable(lineDiv);

            /**
             * TODO: Add logic to show form when clicked.
             * 
            assembly.addEventListener('click', e => {
                e.stopPropagation();
                alert(`Assembly in ${name} clicked!`);
            });
             */

            viewport.appendChild(lineDiv);

            // Connect each intake to hopper
            intakes.forEach(intake => addConnection(intake, hopper, 'internal'));
            if (steps.length > 0) {
                addConnection(hopper, steps[0], 'internal');
                for (let i = 0; i < steps.length - 1; i++) addConnection(steps[i], steps[i+1], 'internal');
                addConnection(steps[steps.length - 1], output, 'internal');
            } else {
                addConnection(hopper, output, 'internal');
            }

            return allLines[id];
        }

        function createComponent(id, text) {
            const div = document.createElement('div');
            div.className = 'component';
            div.id = id;
            div.innerText = text;
            return div;
        }

        function makeDraggable(el) {
            let startX = 0, startY = 0, startLeft = 0, startTop = 0;
            el.addEventListener('pointerdown', (e) => {
                if (e.button !== 0) return;
                // Don't drag if clicking on a button
                if (e.target.tagName === 'BUTTON') return;
                e.preventDefault();
                const s = getAppliedScale();
                startX = e.clientX;
                startY = e.clientY;
                startLeft = el.offsetLeft;
                startTop = el.offsetTop;
                el.setPointerCapture && el.setPointerCapture(e.pointerId);

                function onPointerMove(ev) {
                    ev.preventDefault();
                    const dx = (ev.clientX - startX) / s;
                    const dy = (ev.clientY - startY) / s;
                    el.style.left = (startLeft + dx) + 'px';
                    el.style.top  = (startTop  + dy) + 'px';
                    drawAllLines();
                }

                function onPointerUp(ev) {
                    el.releasePointerCapture && el.releasePointerCapture(ev.pointerId);
                    // snap left and top to grid, accounting for zoom level
                    const visualScale = 1 / zoomLevel;
                    const left = el.offsetLeft;
                    const top = el.offsetTop;
                    const visualGridSize = gridSize * visualScale;
                    const snappedLeft = Math.round(left / visualGridSize) * visualGridSize;
                    const snappedTop = Math.round(top / visualGridSize) * visualGridSize;
                    el.style.left = snappedLeft + 'px';
                    el.style.top = snappedTop + 'px';
                    drawAllLines();
                    document.removeEventListener('pointermove', onPointerMove);
                    document.removeEventListener('pointerup', onPointerUp);
                }

                document.addEventListener('pointermove', onPointerMove);
                document.addEventListener('pointerup', onPointerUp);
            });
        }

        function addConnection(from, to, type = 'internal') {
            connections.push({ from, to, type });
        }

        // ─── Route point computation ──────────────────────────────────────────────

        function getInputPoints(fromStep, toLine) {
            const s     = getAppliedScale();
            const cRect = viewport.getBoundingClientRect();
            const stepR = fromStep.getBoundingClientRect();
            const lineR = toLine.getBoundingClientRect();
            const c = { left: cRect.left / s, top: cRect.top / s };
            const step = { left: stepR.left / s, top: stepR.top / s };
            const line = { left: lineR.left / s, top: lineR.top / s, height: lineR.height / s };
            return [
                { x: (step.left - c.left) + LEFT_INSET,  y: step.top - c.top },
                { x: (step.left - c.left) + LEFT_INSET,  y: step.top - c.top - STEP_CLEARANCE },
                { x: (line.left - c.left) - CLEARANCE,   y: step.top - c.top - STEP_CLEARANCE },
                { x: (line.left - c.left) - CLEARANCE,   y: (line.top - c.top) + line.height / 2 },
                { x:  line.left - c.left,                y: (line.top - c.top) + line.height / 2 },
            ];
        }

        function getOutputPoints(fromOutput, toStep) {
            const s     = getAppliedScale();
            const cRect = viewport.getBoundingClientRect();
            const fromR = fromOutput.getBoundingClientRect();
            const toR   = toStep.getBoundingClientRect();
            const c = { left: cRect.left / s, top: cRect.top / s };
            const f = { right: fromR.right / s, top: fromR.top / s, height: fromR.height / s };
            const t = { right: toR.right / s, top: toR.top / s };
            return [
                { x: f.right - c.left,                y: (f.top - c.top) + f.height / 2 },
                { x: f.right - c.left + CLEARANCE,    y: (f.top - c.top) + f.height / 2 },
                { x: f.right - c.left + CLEARANCE,    y: t.top - c.top - STEP_CLEARANCE },
                { x: (t.right  - c.left) - RIGHT_INSET, y: t.top - c.top - STEP_CLEARANCE },
                { x: (t.right  - c.left) - RIGHT_INSET, y: t.top - c.top },
            ];
        }

        // Return the numeric CSS scale applied to the viewport (1.0 when unscaled)
        function getAppliedScale() {
            const t = viewport.style.transform || '';
            const m = t.match(/scale\(([^)]+)\)/);
            return m ? parseFloat(m[1]) : 1;
        }

        // Read the grid size from CSS variable --line-height (fallback to JS gridSize)
        function getGridSize() {
            const root = getComputedStyle(document.documentElement).getPropertyValue('--line-height') || '';
            if (root && root.trim().endsWith('px')) {
                return parseFloat(root);
            }
            // fallback
            return gridSize;
        }

        // ─── Path walking utilities ───────────────────────────────────────────────

        function pointsToD(pts) {
            return pts.map((p,i) => `${i===0?'M':'L'} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');
        }

        // Compute cumulative arc lengths at each point
        function segmentLengths(pts) {
            const lens = [0];
            for (let i = 1; i < pts.length; i++) {
                const dx = pts[i].x - pts[i-1].x;
                const dy = pts[i].y - pts[i-1].y;
                lens.push(lens[i-1] + Math.sqrt(dx*dx + dy*dy));
            }
            return lens;
        }

        // Given distance along the polyline, return {x, y, angle}
        function samplePath(pts, cumLens, t) {
            const total = cumLens[cumLens.length - 1];
            t = ((t % total) + total) % total; // wrap
            for (let i = 1; i < pts.length; i++) {
                if (t <= cumLens[i] || i === pts.length - 1) {
                    const seg = cumLens[i] - cumLens[i-1];
                    const frac = seg > 0 ? (t - cumLens[i-1]) / seg : 0;
                    const dx = pts[i].x - pts[i-1].x;
                    const dy = pts[i].y - pts[i-1].y;
                    return {
                        x: pts[i-1].x + dx * frac,
                        y: pts[i-1].y + dy * frac,
                        angle: Math.atan2(dy, dx)   // radians, pointing forward
                    };
                }
            }
        }

        // ─── Chevron geometry ─────────────────────────────────────────────────────
        //
        // A chevron at position (cx,cy) pointing in direction `angle`:
        //   forward tip: cx + cos(a)*CHEV_DEPTH,  cy + sin(a)*CHEV_DEPTH
        //   left  arm:   perpendicular -CHEV_HALF  offset, back CHEV_DEPTH
        //   right arm:   perpendicular +CHEV_HALF  offset, back CHEV_DEPTH
        //
        //      L ──── tip ──── R
        //       \            /
        //        (open back)
        //
        // We draw it as a two-segment open path: L→tip→R

        // ─── Conveyor belt state & animation loop ────────────────────────────────

        // Animation with PixiJS ticker
        pixiApp.ticker.add((delta) => {
            const dt = delta / 60; // normalize to ~60 FPS
            pixiBelts.forEach(belt => {
                belt.offset = (belt.offset + ANIM_SPEED * dt) % CHEV_SPACE;
                belt.chevrons.forEach((chevron, i) => {
                    const dist = belt.offset + i * CHEV_SPACE;
                    if (dist > belt.total) {
                        chevron.visible = false;
                        return;
                    }
                    chevron.visible = true;
                    const s = samplePath(belt.pts, belt.cumLens, dist);
                    chevron.position.set(s.x, s.y);
                    chevron.rotation = s.angle;
                });
            });
        });

        // ─── Draw grid ────────────────────────────────────────────────────

        function drawGrid() {
            gridGraphics.clear();
            const scale = getAppliedScale();
            const width = pixiApp.renderer.width / scale;
            const height = pixiApp.renderer.height / scale;
            const posX = pixiApp.stage.position.x;
            const posY = pixiApp.stage.position.y;
            const sX = -posX;
            const sY = -posY;
            gridGraphics.lineStyle(1, 0x000000, 0.06);
            for (let m = 0; ; m++) {
                const x = sX + m * gridSize;
                if (x > sX + width) break;
                gridGraphics.moveTo(x, sY);
                gridGraphics.lineTo(x, sY + height);
            }
            for (let m = 0; ; m++) {
                const y = sY + m * gridSize;
                if (y > sY + height) break;
                gridGraphics.moveTo(sX, y);
                gridGraphics.lineTo(sX + width, y);
            }
        }

        // ─── Draw a conveyor belt (belt body + chevrons) ─────────────────

        function drawConveyorBelt(pts) {
            const cumLens  = segmentLengths(pts);
            const total    = cumLens[cumLens.length - 1];
            const count    = Math.ceil(total / CHEV_SPACE) + 2;

            // Belt body
            const beltGraphics = new PIXI.Graphics();
            beltGraphics.lineStyle(BELT_W + 2, 0x333333); // border
            beltGraphics.moveTo(pts[0].x, pts[0].y);
            for (let i = 1; i < pts.length; i++) {
                beltGraphics.lineTo(pts[i].x, pts[i].y);
            }
            beltGraphics.lineStyle(BELT_W, 0xd4d4d4); // body
            beltGraphics.moveTo(pts[0].x, pts[0].y);
            for (let i = 1; i < pts.length; i++) {
                beltGraphics.lineTo(pts[i].x, pts[i].y);
            }
            beltContainer.addChild(beltGraphics);

            // Chevrons
            const chevronContainer = new PIXI.Container();
            beltContainer.addChild(chevronContainer);

            const chevrons = [];
            for (let i = 0; i < count; i++) {
                const chevron = new PIXI.Graphics();
                chevron.lineStyle(3, 0x777777);
                chevron.moveTo(-CHEV_DEPTH, -CHEV_HALF);
                chevron.lineTo(CHEV_DEPTH, 0);
                chevron.lineTo(-CHEV_DEPTH, CHEV_HALF);
                chevronContainer.addChild(chevron);
                chevrons.push(chevron);
            }

            // Register belt for animation
            pixiBelts.push({ pts, cumLens, total, chevrons, offset: 0 });
        }

        // ─── Draw all connections ─────────────────────────────────────────────────

        function drawAllLines() {
            // Clear PixiJS belts and SVG
            pixiBelts.length = 0;
            beltContainer.removeChildren();
            svg.innerHTML = '';

            // ensure svg covers the full laid-out viewport area so absolute coords match
            svg.style.width = viewport.scrollWidth + 'px';
            svg.style.height = viewport.scrollHeight + 'px';

            drawGrid();

            // Group internal connections by line
            const internalByLine = {};
            connections.forEach(conn => {
                if (conn.type === 'internal') {
                    const lineId = conn.from.id.split('-')[1];
                    if (!internalByLine[lineId]) internalByLine[lineId] = [];
                    internalByLine[lineId].push(conn);
                }
            });

            // Draw single conveyor belt for each line from intake group to output
            Object.keys(internalByLine).forEach(lineId => {
                const line = allLines[lineId];
                // Use the intake group container (holds all intakes) as the starting point
                const intakeGroupEl = line.div.querySelector('.intake-group') || 
                                       (line.intakes && line.intakes[0]) || 
                                       line.intake; // fallback to first intake or single intake
                const components = [intakeGroupEl, line.hopper, ...line.steps, line.output];
                const pts = [];
                const s = getAppliedScale();
                const crRect = viewport.getBoundingClientRect();
                const cr = { left: crRect.left / s, top: crRect.top / s };
                for (let i = 0; i < components.length - 1; i++) {
                    const from = components[i];
                    const to = components[i + 1];
                    const frR = from.getBoundingClientRect();
                    const trR = to.getBoundingClientRect();
                    const fr = { right: frR.right / s, top: frR.top / s, height: frR.height / s };
                    const tr = { left: trR.left / s, top: trR.top / s, height: trR.height / s };
                    const y = (fr.top + fr.height / 2 + tr.top + tr.height / 2) / 2 - cr.top;
                    pts.push({ x: (fr.right - cr.left) * zoomLevel, y: y * zoomLevel });
                    pts.push({ x: (tr.left - cr.left) * zoomLevel, y: y * zoomLevel });
                }
                if (pts.length > 0) drawConveyorBelt(pts);
            });

            // Draw other connections
            connections.forEach(conn => {
                if (conn.type === 'internal') return; // already handled

                let pts;
                if (conn.type === 'output') pts = getOutputPoints(conn.from, conn.to);
                if (conn.type === 'input')  pts = getInputPoints(conn.from, conn.to);
                if (!pts) return;

                // Scale points by zoom level
                pts = pts.map(p => ({ x: p.x * zoomLevel, y: p.y * zoomLevel }));

                if (conn.conveyor) {
                    drawConveyorBelt(pts);
                } else {
                    const el = document.createElementNS("http://www.w3.org/2000/svg","path");
                    el.setAttribute("d", pointsToD(pts));
                    el.classList.add("flow-line", conn.type);
                    svg.appendChild(el);
                }
            });

            // PixiJS animation is always running via ticker
        }

        // ─── Setup ───────────────────────────────────────────────────────────────

        const design   = createLine(1, 1, 1, 3, "Design", [{name: "Design Request", color: "#E8F4F8"}], "SD-4200");
        const software = createLine(2, 4, 5, 2, "Software Development", [{name: "Bugs", mixRatio: 20, color: "#FFE8E8"}, {name: "Features", mixRatio: 80, color: "#E8F8E8"}], "SD-5312");
        const techSupport = createLine(3, 4, 8, 3, "Tech Support", [{name: "Internal IT", color: "#FFF8E8"}, {name: "Support Request", color: "#F8E8FF"}], "SD-100");
        const production = createLine(4, 4, 10, 2, "Production", [{name: "Print Request", color: "#F0E8F8"}]);

        connections.push({ from: design.output,     to: software.steps[1], type: 'output', conveyor: true });
        connections.push({ from: software.steps[1], to: design.div,        type: 'input',  conveyor: true });

        // Zoom controls: zoomLevel ranges from 1.0 (100%) to 3.0 (300%) in 0.25 steps.
        let zoomLevel = 1.0;
        const ZOOM_STEP = 0.25;
        const ZOOM_MIN = 1.0;
        const ZOOM_MAX = 3.0;

        const zoomInBtn = document.getElementById('zoomIn');
        const zoomOutBtn = document.getElementById('zoomOut');

        function applyZoom() {
            // Store grid positions before zoom change
            const gridPositions = {};
            const oldVisualScale = 1 / zoomLevel;
            const oldVisualGridSize = gridSize * oldVisualScale;
            
            Object.keys(allLines).forEach(lineId => {
                const lineDiv = allLines[lineId].div;
                const gridX = Math.round(lineDiv.offsetLeft / oldVisualGridSize);
                const gridY = Math.round(lineDiv.offsetTop / oldVisualGridSize);
                gridPositions[lineId] = { gridX, gridY };
            });

            // visual scale = 1 / zoomLevel so larger zoomLevel shows more content (zoomed out)
            const visualScale = 1 / zoomLevel;
            viewport.style.transform = `scale(${visualScale})`;
            pixiApp.stage.scale.set(visualScale);
            pixiApp.stage.position.set(-canvas.scrollLeft / visualScale, -canvas.scrollTop / visualScale);
            
            // Restore elements to their grid positions at new zoom level
            const newVisualGridSize = gridSize * visualScale;
            Object.keys(allLines).forEach(lineId => {
                const lineDiv = allLines[lineId].div;
                const { gridX, gridY } = gridPositions[lineId];
                lineDiv.style.left = (gridX * newVisualGridSize) + 'px';
                lineDiv.style.top = (gridY * newVisualGridSize) + 'px';
            });
            
            updateZoomButtonStates();
            
            // Redraw belts to reconnect to element positions
            drawAllLines();
        }

        function updateZoomButtonStates() {
            zoomInBtn.disabled = zoomLevel <= ZOOM_MIN;
            zoomOutBtn.disabled = zoomLevel >= ZOOM_MAX;
        }

        zoomInBtn.addEventListener('click', () => {
            zoomLevel = Math.max(ZOOM_MIN, +(zoomLevel - ZOOM_STEP).toFixed(2));
            applyZoom();
        });
        zoomOutBtn.addEventListener('click', () => {
            zoomLevel = Math.min(ZOOM_MAX, +(zoomLevel + ZOOM_STEP).toFixed(2));
            applyZoom();
        });

        // Initialize zoom button states
        updateZoomButtonStates();

        // handle window/container resize
        window.addEventListener('resize', () => {
            pixiApp.renderer.resize(window.innerWidth, window.innerHeight);
            svg.style.width = viewport.scrollWidth + 'px';
            svg.style.height = viewport.scrollHeight + 'px';
            drawAllLines();
        });

        // --- Panning (grab the background to scroll) --------------------
        let isPanning = false;
        let panStartX = 0, panStartY = 0, panStartScrollLeft = 0, panStartScrollTop = 0;

        viewport.addEventListener('pointerdown', (e) => {
            // only start pan when primary button and clicked directly on the viewport background
            if (e.button !== 0) return;
            if (e.target !== viewport) return;
            isPanning = true;
            panStartX = e.clientX;
            panStartY = e.clientY;
            panStartScrollLeft = canvas.scrollLeft;
            panStartScrollTop = canvas.scrollTop;
            viewport.classList.add('grabbing');
            try { viewport.setPointerCapture(e.pointerId); } catch (err) {}
            e.preventDefault();
        });

        document.addEventListener('pointermove', (e) => {
            if (!isPanning) return;
            const s = getAppliedScale();
            const dx = e.clientX - panStartX;
            const dy = e.clientY - panStartY;
            // move scroll inversely to mouse movement; account for CSS scale
            const scrollLeft = panStartScrollLeft - dx / s;
            const scrollTop = panStartScrollTop - dy / s;
            canvas.scrollLeft = scrollLeft;
            canvas.scrollTop = scrollTop;
            pixiApp.stage.position.set(-scrollLeft / s, -scrollTop / s);
            drawGrid();
            e.preventDefault();
        });

        document.addEventListener('pointerup', (e) => {
            if (!isPanning) return;
            isPanning = false;
            try { viewport.releasePointerCapture(e.pointerId); } catch (err) {}
            viewport.classList.remove('grabbing');
        });

        // initial draw
        setTimeout(() => { applyZoom(); }, 100);
    </script>
</body>
</html>
